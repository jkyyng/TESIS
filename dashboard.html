<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Universidad Externado de Colombia - Análisis de Voz Académica — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#08231A;--bg2:#0D3320;--bg3:#123D28;--bg4:#184A31;
      --border:rgba(200,230,210,0.1);--border2:rgba(200,230,210,0.2);
      --text:#F0F5F0;--muted:#8FAD9B;
      --accent:#2BAF7A;--accent-btn:#1F7A50;--accent2:#5EE0A3;
      --green:#4ADE80;--yellow:#FBBF24;--red:#F87171;--purple:#A78BFA;
      --font-d:'Playfair Display',Georgia,serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;}
    /* Header */
    .header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid rgba(6,63,38,0.15);background:#FFFFFF;backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;}
    .logo{font-family:var(--font-d);font-weight:800;font-size:20px;display:flex;align-items:center;gap:10px;color:#16261C;}
    .logo img{height:30px;width:auto;display:block;}
    .logo span{color:#0B5D36;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .user-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--accent2);font-family:var(--font-m);}
    .btn-sm{background:none;border:1px solid rgba(6,63,38,0.25);border-radius:8px;padding:5px 12px;font-size:12px;color:#5C6B62;cursor:pointer;font-family:var(--font-b);transition:all 0.15s;}
    .btn-sm:hover{color:#16261C;border-color:rgba(6,63,38,0.4);}
    /* Login */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,rgba(43,175,122,0.08) 0%,transparent 60%);}
    .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:40px;max-width:400px;width:100%;}
    .login-title{font-family:var(--font-d);font-size:26px;font-weight:800;margin-bottom:4px;}
    .login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
    .rol-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
    .rol-opt{padding:18px 12px;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;transition:all 0.2s;color:var(--text);}
    .grupo-btn{display:block;width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;color:var(--text);font-family:var(--font-b);transition:all 0.2s;}
    .grupo-btn:hover{border-color:var(--accent);background:rgba(43,175,122,0.08);}
    .rol-opt:hover{border-color:var(--accent);transform:translateY(-2px);}
    .rol-opt.selected{border-color:var(--accent);background:rgba(43,175,122,0.1);}
    .rol-opt .ri{font-size:28px;margin-bottom:6px;display:block;}
    .rol-opt .rl{font-size:13px;font-weight:700;font-family:var(--font-d);}
    .fl{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);font-weight:500;display:block;margin-bottom:6px;}
    .fi{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:14px;font-family:var(--font-b);color:var(--text);width:100%;transition:border-color 0.15s;margin-bottom:10px;}
    .fi:focus{outline:none;border-color:var(--accent);}
    .fm{font-size:12px;min-height:18px;margin-bottom:10px;}
    .fm.err{color:var(--red);}
    .fm.ok{color:var(--green);}
    .btn-p{width:100%;padding:14px;background:var(--accent-btn);color:white;border:none;border-radius:10px;font-family:var(--font-d);font-weight:700;font-size:15px;cursor:pointer;transition:all 0.2s;}
    .btn-p:hover{background:#23935F;transform:translateY(-1px);}
    .btn-p:disabled{background:var(--bg3);color:var(--muted);cursor:not-allowed;transform:none;}
    /* Main */
    .main{padding:28px;max-width:1200px;margin:0 auto;}
    .page-title{font-family:var(--font-d);font-size:26px;font-weight:800;margin-bottom:4px;}
    .page-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
    /* Tabs */
    .tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:1px solid var(--border);}
    .tab{padding:10px 22px;background:none;border:none;color:var(--muted);font-family:var(--font-b);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
    .tab:hover{color:var(--text);}
    .tab.active{color:var(--accent2);border-bottom-color:var(--accent2);font-weight:600;}
    .tab-content{display:none;}
    .tab-content.active{display:block;}
    /* KPIs */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
    @media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
    .kpi{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;}
    .kpi.highlight{border-color:rgba(43,175,122,0.3);background:rgba(43,175,122,0.05);}
    .kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:8px;}
    .kpi-value{font-family:var(--font-d);font-size:30px;font-weight:800;}
    .kpi-sub{font-size:11px;color:var(--muted);margin-top:4px;}
    /* Cards */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px;}
    .card-title{font-family:var(--font-d);font-size:14px;font-weight:700;margin-bottom:16px;color:var(--text);display:flex;align-items:center;gap:8px;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
    @media(max-width:700px){.grid-2,.grid-3{grid-template-columns:1fr;}}
    /* Table */
    .tw{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap;}
    td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(43,175,122,0.03);}
    /* Badges */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
    .b-green{background:rgba(74,222,128,0.12);color:var(--green);border:1px solid rgba(74,222,128,0.2);}
    .b-yellow{background:rgba(251,191,36,0.12);color:var(--yellow);border:1px solid rgba(251,191,36,0.2);}
    .b-red{background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.2);}
    .b-blue{background:rgba(43,175,122,0.12);color:var(--accent2);border:1px solid rgba(43,175,122,0.2);}
    /* Riesgo / outliers */
    tr.row-risk td{background:rgba(248,113,113,0.09);}
    tr.row-risk td:first-child{box-shadow:inset 3px 0 0 var(--red);}
    .b-risk{background:rgba(248,113,113,0.12);color:#FECACA;border:1px solid rgba(248,113,113,0.35);animation:pulseRisk 2s infinite;}
    @keyframes pulseRisk{0%,100%{opacity:1}50%{opacity:0.65}}
    /* Interpretación */
    .interp{display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border);}
    .interp:last-child{border-bottom:none;}
    .interp .ii{font-size:20px;line-height:1;}
    .interp .it{font-size:13px;color:var(--text);line-height:1.5;}
    .interp .it b{color:var(--accent2);}
    .sel-est{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--text);font-family:var(--font-b);}
    .sel-est:focus{outline:none;border-color:var(--accent);}
    /* Sesiones */
    .sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}
    .sc{padding:10px 8px;border-radius:10px;text-align:center;border:1px solid var(--border);transition:all 0.2s;}
    .sc.ok{background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.3);}
    .sc.no{background:rgba(248,113,113,0.05);border-color:rgba(248,113,113,0.15);}
    .sc .sn{font-family:var(--font-d);font-weight:700;font-size:15px;display:block;margin-bottom:2px;}
    .sc .sf{font-size:10px;color:var(--muted);}
    .sc .st{font-size:10px;margin-top:3px;display:block;}
    .sc.ok .st{color:var(--green);}
    .sc.no .st{color:var(--red);}
    /* Progress bar comparativa */
    .cmp-row{display:flex;flex-direction:column;gap:12px;}
    .cmp-item{display:grid;grid-template-columns:140px 1fr 50px;align-items:center;gap:10px;font-size:12px;}
    .cmp-label{color:var(--muted);text-align:right;}
    .cmp-bar{background:var(--bg3);border-radius:4px;height:8px;overflow:hidden;position:relative;}
    .cmp-fill{height:100%;border-radius:4px;transition:width 0.6s ease;}
    .cmp-fill.me{background:var(--accent2);}
    .cmp-fill.best{background:var(--green);}
    .cmp-fill.worst{background:var(--red);}
    .cmp-fill.prom{background:var(--purple);}
    .cmp-val{font-family:var(--font-m);font-size:11px;color:var(--text);}
    .cmp-legend{display:flex;gap:16px;margin-bottom:14px;font-size:11px;}
    .cmp-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
    /* Notas */
    .nota-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
    .nota-card{background:var(--bg3);border-radius:10px;padding:14px;text-align:center;}
    .nota-card-label{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:6px;}
    .nota-card-value{font-family:var(--font-d);font-size:22px;font-weight:800;}
    /* Spinner */
    .spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:50px auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-msg{text-align:center;color:var(--muted);font-size:13px;padding:8px;}
    /* Chart */
    .cw{position:relative;height:220px;}
    .cw-tall{position:relative;height:280px;}
    /* Metric mini */
    .mr{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    @media(max-width:600px){.mr{grid-template-columns:repeat(2,1fr);}}
    .ms{background:var(--bg3);border-radius:10px;padding:12px 14px;}
    .msl{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:4px;}
    .msv{font-family:var(--font-d);font-size:18px;font-weight:700;}
    .mss{font-size:10px;color:var(--muted);margin-top:2px;}
    /* Toast */
    .toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 20px;font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all 0.3s;pointer-events:none;}
    .toast.show{opacity:1;transform:translateY(0);}
  </style>
</head>

<script>
// ── Config ──
const URL_AS = 'https://script.google.com/macros/s/AKfycbw12TxEJDssZ8JYEx7GH7nd0TD5IfELgqki5KmuCbRp7kDlPIdyVO8Aka0zGtQlbIAe0A/exec';
const GRUPOS = {
  edwin_metodos: 'Edwin Muñoz - Métodos Numéricos',
  edwin_algebra: 'Edwin Muñoz - Álgebra Líneal',
  omar_24: 'Omar Palacios - Data Mining (Grupo 2-4)',
  omar_46: 'Omar Palacios - Data Mining (Grupo 4-6)'
};
// Los nombres de estudiantes ya NO viven hardcodeados aquí — vienen del backend
// (roster maestro en Sheets) en cada login/consulta. nombreDe() ahora resuelve
// contra un mapa que se llena en tiempo de ejecución (ver poblarNombres()).
let NOMBRES = {};
function nombreDe(ced){
  const n=NOMBRES[String(ced)];
  if(!n)return String(ced);
  return n;
}
const SS=[
  {v:'24/07/2026',l:'A1'},{v:'31/07/2026',l:'A2'},{v:'07/08/2026',l:'A3'},{v:'14/08/2026',l:'A4'},
  {v:'21/08/2026',l:'A5'},{v:'28/08/2026',l:'A6'},{v:'04/09/2026',l:'A7'},{v:'11/09/2026',l:'A8'},
  {v:'18/09/2026',l:'A9'},{v:'25/09/2026',l:'A10'},{v:'02/10/2026',l:'A11'},{v:'16/10/2026',l:'A12'},
  {v:'23/10/2026',l:'A13'},{v:'30/10/2026',l:'A14'},{v:'06/11/2026',l:'A15'},
];
// Las fechas de Sesion vienen como texto 'dd/MM/yyyy', así que ordenarlas con .sort() o
// .localeCompare() las trata como texto y las desordena (ej: '01/07/2026' queda antes que
// '09/06/2026' porque empieza por '0','1'). Este índice da el orden cronológico real.
const SS_ORDEN=Object.fromEntries(SS.map((s,i)=>[s.v,i]));
function ordenSesion(v){ const o=SS_ORDEN[v]; return o===undefined?Infinity:o; }
const CD={plugins:{legend:{labels:{color:'#8FAD9B',font:{family:'DM Sans',size:11}}}},scales:{x:{ticks:{color:'#8FAD9B',font:{size:10},maxRotation:0},grid:{color:'rgba(200,230,210,0.05)'}},y:{ticks:{color:'#8FAD9B',font:{size:10}},grid:{color:'rgba(200,230,210,0.05)'}}}};

let ROL='',CED='',DATA=null,NOTAS=null,GP='',GK='',CH={};
let FILTRO_SESION='',FILTRO_ESTUDIANTE='',TAB_ACTIVA='resumen';
let FILTRO_SESION_EST='';

// ── Login — cédula+clave, igual para profesor y estudiante (ambos viven en el mismo
// roster maestro, distinguidos solo por Vinculo del lado del backend) ──
let gruposDeEstaCedula=[]; // grupos a los que pertenece la cédula que acaba de iniciar sesión
function elegirRol(r){
  ROL=r;
  document.getElementById('opt-p').classList.toggle('selected',r==='p');
  document.getElementById('opt-e').classList.toggle('selected',r==='e');
  document.getElementById('ik').value='';document.getElementById('mk').textContent='';
  document.getElementById('ic').value='';document.getElementById('mc').textContent='';
  document.getElementById('be').disabled=true;
}
function vC(){
  document.getElementById('mc').textContent='';
  vK();
}
function vK(){
  const k=document.getElementById('ik').value.trim();
  const c=document.getElementById('ic').value.trim();
  document.getElementById('be').disabled = !(c && /^[A-Za-z0-9]{3}$/.test(k));
  document.getElementById('mk').textContent='';
}
async function entrar(){
  const k=document.getElementById('ik').value.trim().toUpperCase();
  const c=document.getElementById('ic').value.trim();
  const btn=document.getElementById('be');
  btn.disabled=true; btn.textContent='Verificando...';
  try{
    const url=`${URL_AS}?action=loginEstudiante&cedula=${encodeURIComponent(c)}&clave=${encodeURIComponent(k)}`;
    const res=await fetch(url);
    const data=await res.json();
    btn.textContent='Entrar →';
    if(!data.ok){
      document.getElementById('mk').textContent=data.error||'Cédula o clave incorrecta';
      document.getElementById('mk').className='fm err';
      btn.disabled=false;
      return;
    }
    CED=c;
    gruposDeEstaCedula=data.grupos;
    if(gruposDeEstaCedula.length===0){
      document.getElementById('mk').textContent='No estás matriculado en ningún curso todavía';
      document.getElementById('mk').className='fm err';
      btn.disabled=false;
      return;
    }
    if(gruposDeEstaCedula.length===1){
      GK=gruposDeEstaCedula[0]; GP=GRUPOS[GK]||GK;
      mostrarDashboard();
    } else {
      mostrarElegirCurso();
    }
  }catch(e){
    document.getElementById('mk').textContent='Error de conexión, intenta de nuevo';
    document.getElementById('mk').className='fm err';
    btn.disabled=false; btn.textContent='Entrar →';
  }
}
function mostrarElegirCurso(){
  document.getElementById('rol-grid').style.display='none';
  document.getElementById('bloque-credenciales').style.display='none';
  document.getElementById('bloque-elegir-curso').style.display='';
  document.getElementById('grid-cursos').innerHTML=gruposDeEstaCedula.map(g=>`
    <button class="grupo-btn" onclick="elegirCursoDashboard('${g}')" style="text-align:left;padding:14px 16px;">
      <div style="font-weight:700;">${GRUPOS[g]||g}</div>
    </button>`).join('');
}
function elegirCursoDashboard(g){
  GK=g; GP=GRUPOS[g]||g;
  mostrarDashboard();
}
function mostrarDashboard(){
  document.getElementById('sc-login').style.display='none';
  document.getElementById('sc-dash').style.display='';
  document.getElementById('ub').textContent=ROL==='p'?'👨‍🏫 '+GP:'🎓 '+CED;
  document.getElementById('dm').innerHTML='<div class="spinner"></div><div class="loading-msg">Cargando datos...</div>';
  cargar();
}
function salir(){

async function cargar(){
  try{
    const res=await fetch(`${URL_AS}?action=getDashboard`);
    const d=await res.json();
    if(!d.ok)throw new Error(d.error||'Error');
    DATA=dedupUltimaPorSesion(d.registros);
    NOTAS=d.notas||{};

    if(ROL==='p') renderProf(DATA.filter(r=>r.Grupo===GP), NOTAS[GK]||[]);
    else renderEst(DATA, NOTAS, CED, GK);
  }catch(err){
    document.getElementById('dm').innerHTML=`<div style="text-align:center;padding:60px;color:var(--muted)"><div style="font-size:40px;margin-bottom:12px">⚠️</div><div style="font-size:15px;color:var(--text);margin-bottom:8px">Error al cargar datos</div><div style="font-size:13px">${err.message}</div><br/><button onclick="cargar()" style="background:var(--accent-btn);color:white;border:none;border-radius:8px;padding:10px 20px;cursor:pointer">Reintentar</button></div>`;
  }

// ── Utils ──
function ns(s){return String(s||'').split(' ')[0].trim();}
// Si un estudiante (o profesor) mandó más de un audio para la misma sesión, se queda solo con el
// más reciente. Las filas llegan del backend en orden cronológico (siempre se agregan al final),
// así que la última que pisa cada clave Cedula+Sesion es la correcta.
function dedupUltimaPorSesion(rows){
  const m={};
  rows.forEach(r=>{ m[String(r.Cedula)+'|'+ns(r.Sesion)]=r; });
  return Object.values(m);
}
function p(rows,key){const v=rows.map(r=>parseFloat(r[key])).filter(v=>!isNaN(v));return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;}
function gb(arr,key){return arr.reduce((acc,r)=>{const k=ns(r[key]||r['Sesion']||key);(acc[k]=acc[k]||[]).push(r);return acc;},{});}
function gbc(arr,key){return arr.reduce((acc,r)=>{(acc[r[key]]=acc[r[key]]||[]).push(r);return acc;},{});}
function notaEst(notas, cedula){
  if(!notas||!notas.length)return null;
  const row=notas.find(r=>String(r['Documento']||r['Cedula']||r['cedula']||'')===String(cedula));
  if(!row)return null;
  return row;
}
// Ya no depende de nombres de columna hardcodeados por grupo (eso se rompía apenas
// cambiaban los grupos, como pasó ahora). Busca cualquier columna que contenga la
// palabra "parcial" o "ep c" como el 50% principal, y promedia todas las demás columnas
// numéricas (menos identificadores obvios) como el otro 50% de actividades.
function calcPromedio(notaRow, grupoKey){
  if(!notaRow)return null;
  const EXCLUIR=['documento','cedula','cédula','nombre','correo','email','vinculo','grupos','grupo','clave','promedio final'];
  let colParcial=null;
  const actividades=[];
  Object.keys(notaRow).forEach(k=>{
    const kl=k.trim().toLowerCase();
    if(EXCLUIR.includes(kl))return;
    const val=parseFloat(notaRow[k]);
    if(isNaN(val))return;
    if(kl.includes('parcial')||kl.includes('ep c')){
      if(colParcial===null)colParcial=val; // la primera columna que matchee como "el parcial"
    } else if(val>0){
      actividades.push(val);
    }
  });
  if(colParcial===null||colParcial<=0)return null;
  const promAct=actividades.length?actividades.reduce((a,b)=>a+b,0)/actividades.length:0;
  return{parcial:colParcial,actividades:promAct,promedio:(colParcial*0.5+promAct*0.5),notaRow};
}
function clasificar(prom){
  if(prom===null||isNaN(prom))return{cls:'b-blue',label:'Sin nota',emoji:'—'};
  // Notas sobre 50 → convertir a escala 5
  const n=prom>10?prom/10:prom;
  if(n>=4.0)return{cls:'b-green',label:'Alto',emoji:'🟢'};
  if(n>=3.0)return{cls:'b-yellow',label:'Medio',emoji:'🟡'};
  return{cls:'b-red',label:'Bajo',emoji:'🔴'};
}
// Promedio del grupo por variable — se usa como referencia de comparación en vez de
// "mejor/peor" (comparar contra un extremo es comparar contra un caso posiblemente atípico,
// inestable con grupos de 14-30 personas; el promedio es una referencia más robusta).
// Es promedio de promedios: primero se promedia cada estudiante, luego se promedian esos
// promedios — así un estudiante que mandó más audios no pesa más que otro en la comparación.
function calcularPromedioGrupo(perfiles){
  const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;
  const conNota=perfiles.filter(pf=>pf.np);
  const conSim=perfiles.filter(pf=>pf.sim>0);
  const conPpm=perfiles.filter(pf=>pf.ppm>0);
  return{
    rl:avg(perfiles.map(pf=>pf.rl)), mts:avg(perfiles.map(pf=>pf.mts)),
    dds:avg(perfiles.map(pf=>pf.dds)), neg:avg(perfiles.map(pf=>pf.neg)),
    sim:conSim.length?avg(conSim.map(pf=>pf.sim)):0,
    pal:avg(perfiles.map(pf=>pf.pal)),
    ppm:conPpm.length?avg(conPpm.map(pf=>pf.ppm)):0,
    rep:avg(perfiles.map(pf=>pf.rep||0)), dif:avg(perfiles.map(pf=>pf.dif||0)),
    nota:conNota.length?avg(conNota.map(pf=>pf.np.promedio)):null,
  };
}
// Si hay al menos 3 estudiantes con nota, la comparación usa nota (la variable de resultado
// real); si no (típico antes del Parcial 1), cae de vuelta a riqueza léxica como proxy temporal.
function criterioComparacion(perfiles){
  return perfiles.filter(pf=>pf.np).length>=3?'nota':'riqueza_lexica';
}

// Riesgo: puntaje compuesto (z-score combinado de nota, riqueza léxica y similitud coseno,
// cuando existan) en vez de un solo indicador. Umbral estadístico fijo (z < -1, "notablemente
// por debajo del grupo") en vez de forzar siempre el 10% con peor desempeño — con un umbral fijo,
// si nadie está realmente mal, nadie se marca (antes SIEMPRE marcaba a alguien, incluso en un
// grupo donde todos van bien, solo por ser el último de la fila).
// Requiere al menos 5 estudiantes para tener una base estadística mínima razonable.
function calcularRiesgo(perfiles){
  if(perfiles.length<5){ perfiles.forEach(pf=>{pf.riesgo=false;pf.zscore=0;}); return; }
  const zscores=(vals)=>{
    const validos=vals.map((v,i)=>({v,i})).filter(x=>x.v!=null&&!isNaN(x.v));
    if(validos.length<3) return vals.map(()=>null);
    const media=validos.reduce((a,b)=>a+b.v,0)/validos.length;
    const desv=Math.sqrt(validos.reduce((s,x)=>s+(x.v-media)**2,0)/validos.length)||1;
    const out=vals.map(()=>null);
    validos.forEach(x=>{out[x.i]=(x.v-media)/desv;});
    return out;
  };
  const zNota=zscores(perfiles.map(pf=>pf.np?pf.np.promedio:null));
  const zRl=zscores(perfiles.map(pf=>pf.rl));
  const zSim=zscores(perfiles.map(pf=>pf.sim>0?pf.sim:null));
  perfiles.forEach((pf,i)=>{
    // Combina las señales disponibles para ese estudiante (no todas siempre existen:
    // sim. coseno puede faltar si el profesor no ha subido audio de esa sesión aún).
    const señales=[
      zNota[i]!=null?{z:zNota[i],w:2}:null,   // nota pesa más — es el resultado real
      zRl[i]!=null?{z:zRl[i],w:1}:null,
      zSim[i]!=null?{z:zSim[i],w:1}:null,
    ].filter(Boolean);
    if(señales.length===0){ pf.riesgo=false; pf.zscore=0; return; }
    const wTotal=señales.reduce((a,s)=>a+s.w,0);
    const zCompuesto=señales.reduce((a,s)=>a+s.z*s.w,0)/wTotal;
    pf.zscore=zCompuesto;
    pf.riesgo=zCompuesto<-1; // más de 1 desviación estándar por debajo del grupo
  });
}
// Traduce las métricas crudas a lectura en lenguaje sencillo.
function interpretar(yo,promedio,criterio){
  const out=[];
  // Riqueza léxica
  if(yo.rl>=0.65) out.push({icon:'🟢',text:`<b>Vocabulario variado.</b> Usa palabras distintas con frecuencia, lo que suele reflejar buen dominio del tema.`});
  else if(yo.rl>=0.45) out.push({icon:'🟡',text:`<b>Vocabulario adecuado.</b> Está en un rango normal, aunque repetir menos palabras podría mejorar la claridad.`});
  else out.push({icon:'🔴',text:`<b>Vocabulario limitado.</b> Repite bastantes palabras; ampliar el vocabulario usado en las respuestas podría ayudar.`});
  // Muletillas
  if(yo.mts<=2) out.push({icon:'🟢',text:`<b>Discurso fluido.</b> Casi no usa muletillas ("o sea", "eh", etc.).`});
  else if(yo.mts<=5) out.push({icon:'🟡',text:`<b>Algunas muletillas.</b> Es un nivel normal, no representa una alerta por sí solo.`});
  else out.push({icon:'🔴',text:`<b>Muchas muletillas.</b> Puede indicar nerviosismo o que la respuesta no fue preparada con anticipación.`});
  // Dudas
  if(yo.dds<=1) out.push({icon:'🟢',text:`<b>Habla con seguridad.</b> Pocas expresiones de duda en sus respuestas.`});
  else if(yo.dds<=3) out.push({icon:'🟡',text:`<b>Duda ocasional.</b> Normal en explicaciones más complejas.`});
  else out.push({icon:'🔴',text:`<b>Duda frecuente.</b> Repasar el tema antes de grabar podría ayudar a responder con más confianza.`});
  // Velocidad de habla (solo si hay dato — puede venir en 0 por audios sin duración registrada)
  if(yo.ppm>0){
    if(yo.ppm>220) out.push({icon:'🏃',text:`<b>Habla muy rápido.</b> Puede ser apuro o ansiedad al grabar; tomarse un momento antes de empezar podría ayudar.`});
    else if(yo.ppm<80) out.push({icon:'🐢',text:`<b>Habla muy despacio.</b> Puede reflejar duda o que la respuesta se está construyendo sobre la marcha.`});
  }
  // Repeticiones de contenido (distinto de muletillas — repetir palabras reales, no relleno)
  if(yo.rep>3) out.push({icon:'🔁',text:`<b>Repite bastante contenido.</b> Frases como "la, la derivada" pueden indicar que se está pensando la respuesta en tiempo real.`});
  // Percepción de dificultad del tema (distinto de "dudas" — esto es sobre el tema, no la seguridad propia)
  if(yo.dif>2) out.push({icon:'😕',text:`<b>Menciona que el tema le pareció difícil.</b> Vale la pena repasarlo o consultar dudas puntuales sobre esta sesión.`});
  // Comparativa vs el PROMEDIO del grupo (no contra el mejor/peor — comparar contra un extremo
  // es comparar contra un posible caso atípico; el promedio es una referencia más estable).
  if(promedio){
    if(criterio==='nota' && yo.nota!=null && promedio.nota!=null && promedio.nota>0){
      const diff=yo.nota-promedio.nota;
      if(diff>=0.3) out.push({icon:'⭐',text:`Su nota está <b>por encima del promedio del grupo</b> (${yo.nota.toFixed(1)} vs. ${promedio.nota.toFixed(1)}).`});
      else if(diff<=-0.3) out.push({icon:'⚠️',text:`Su nota está <b>por debajo del promedio del grupo</b> (${yo.nota.toFixed(1)} vs. ${promedio.nota.toFixed(1)}) — vale la pena revisar qué está pasando.`});
    } else if(promedio.rl>0){
      const diff=yo.rl-promedio.rl;
      if(diff>=0.1) out.push({icon:'⭐',text:`Su riqueza léxica está <b>por encima del promedio del grupo</b>.`});
      else if(diff<=-0.1) out.push({icon:'⚠️',text:`Su riqueza léxica está <b>por debajo del promedio del grupo</b> — vale la pena reforzar este punto.`});
    }
  }
  return out;
}

// Deriva {est, sesVistas, perfiles} aplicando los filtros globales activos.
// Se usa tanto en renderProf() como en st() (al cambiar de pestaña hay que
// volver a dibujar las gráficas porque los canvas estaban ocultos y sin tamaño).
function datosFiltradosProf(){
  const d=DATA.filter(r=>r.Grupo===GP);
  const estTodos=d.filter(r=>r.Es_Profesor!=='SÍ'&&String(r.Cedula)!=='654321');
  const sesionesDisponibles=[...new Set(estTodos.map(r=>ns(r.Sesion)))].sort((a,b)=>ordenSesion(a)-ordenSesion(b));

  const construirPerfil=(ced,rows)=>{
    const nr=notaEst(NOTAS[GK]||[],ced);
    const np=calcPromedio(nr,GK);
    return{ced,rows,nr,np,cl:clasificar(np?.promedio||null),
      rl:p(rows,'riqueza_lexica'),mts:p(rows,'conteo_muletillas'),
      dds:p(rows,'conteo_dudas'),neg:p(rows,'conteo_negaciones'),
      sim:p(rows,'similitud_coseno'),pal:p(rows,'num_palabras'),
      ppm:p(rows,'palabras_por_minuto'),rep:p(rows,'conteo_repeticiones'),
      pausas:p(rows,'num_pausas'),pausaProm:p(rows,'pausa_promedio'),
      dif:p(rows,'conteo_percepcion_dificultad'),
      enviadas:rows.length};
  };

  // perfilesGrupo: solo respeta el filtro de SESIÓN (nunca el de estudiante) — es la base
  // correcta para calcular "mejor/peor del grupo", incluso cuando se está viendo a 1 solo estudiante.
  let estGrupo=estTodos;
  if(FILTRO_SESION) estGrupo=estGrupo.filter(r=>ns(r.Sesion)===FILTRO_SESION);
  const cedsGrupo=[...new Set(estGrupo.map(r=>String(r.Cedula)))];
  const perfilesGrupo=cedsGrupo.map(ced=>construirPerfil(ced,estGrupo.filter(r=>String(r.Cedula)===ced)))
    .sort((a,b)=>(b.np?.promedio||0)-(a.np?.promedio||0));
  calcularRiesgo(perfilesGrupo);

  // est/perfiles: respeta AMBOS filtros — es lo que efectivamente se muestra en tablas/gráficas.
  let est=estGrupo;
  if(FILTRO_ESTUDIANTE) est=est.filter(r=>String(r.Cedula)===FILTRO_ESTUDIANTE);
  const sesVistas=FILTRO_SESION?[FILTRO_SESION]:sesionesDisponibles;
  const ceds=[...new Set(est.map(r=>String(r.Cedula)))];
  const perfiles=FILTRO_ESTUDIANTE?perfilesGrupo.filter(pf=>ceds.includes(pf.ced)):perfilesGrupo;

  return{est,sesVistas,perfiles,perfilesGrupo,estTodos,sesionesDisponibles};
}

function tAlertas(perfiles,sesVistas){
  const bajo=perfiles.filter(pf=>pf.cl.label==='Bajo');
  const pocas=perfiles.filter(pf=>pf.enviadas/sesVistas.length<0.6);
  const muletillas=perfiles.filter(pf=>pf.mts>5).sort((a,b)=>b.mts-a.mts);
  const dudas=perfiles.filter(pf=>pf.dds>3).sort((a,b)=>b.dds-a.dds);
  // Velocidad de habla atípica: muy rápido puede indicar apuro/ansiedad, muy lento puede indicar
  // duda o falta de fluidez. Umbrales aproximados (conversación normal en español ~120-180 ppm);
  // se ignoran los que quedaron en 0 por falta de duración registrada.
  const veloz=perfiles.filter(pf=>pf.ppm>220).sort((a,b)=>b.ppm-a.ppm);
  const lento=perfiles.filter(pf=>pf.ppm>0&&pf.ppm<80).sort((a,b)=>a.ppm-b.ppm);
  const repite=perfiles.filter(pf=>pf.rep>3).sort((a,b)=>b.rep-a.rep);
  const dificultad=perfiles.filter(pf=>pf.dif>2).sort((a,b)=>b.dif-a.dif);

  const mkAlerta=(title,items,cols,fn)=>items.length===0
    ?`<div class="card"><div class="card-title">${title}</div><div style="color:var(--green);font-size:13px">✅ Sin alertas en este indicador</div></div>`
    :`<div class="card"><div class="card-title">${title}</div><div class="tw"><table>
      <tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>
      ${items.map(fn).join('')}
    </table></div></div>`;
  const cedCol=pf=>`<td>${nombreDe(pf.ced)}<div style="font-family:var(--font-m);font-size:10px;color:var(--muted)">${pf.ced}</div></td>`;

  return `
    ${mkAlerta('🔴 Estudiantes con bajo desempeño',bajo,['Estudiante','Nota prom.','Riqueza léx.','Muletillas'],
      pf=>`<tr>${cedCol(pf)}<td>${pf.np?.promedio.toFixed(1)||'—'}</td><td>${(pf.rl*100).toFixed(1)}%</td><td>${pf.mts.toFixed(1)}</td></tr>`)}
    ${mkAlerta('📭 Estudiantes con bajo cumplimiento (&lt;60%)',pocas,['Estudiante','Enviadas','%'],
      pf=>`<tr>${cedCol(pf)}<td>${pf.enviadas}/${sesVistas.length}</td><td>${Math.round(pf.enviadas/sesVistas.length*100)}%</td></tr>`)}
    <div class="grid-2">
      ${mkAlerta('💬 Muchas muletillas (&gt;5)',muletillas,['Estudiante','Promedio'],
        pf=>`<tr>${cedCol(pf)}<td>${pf.mts.toFixed(1)}</td></tr>`)}
      ${mkAlerta('🤔 Muchas expresiones de duda (&gt;3)',dudas,['Estudiante','Promedio'],
        pf=>`<tr>${cedCol(pf)}<td>${pf.dds.toFixed(1)}</td></tr>`)}
    </div>
    <div class="grid-2">
      ${mkAlerta('🏃 Velocidad de habla muy alta (&gt;220 ppm)',veloz,['Estudiante','Palabras/min'],
        pf=>`<tr>${cedCol(pf)}<td>${Math.round(pf.ppm)}</td></tr>`)}
      ${mkAlerta('🐢 Velocidad de habla muy baja (&lt;80 ppm)',lento,['Estudiante','Palabras/min'],
        pf=>`<tr>${cedCol(pf)}<td>${Math.round(pf.ppm)}</td></tr>`)}
    </div>
    <div class="grid-2">
      ${mkAlerta('🔁 Muchas repeticiones de contenido (&gt;3)',repite,['Estudiante','Promedio'],
        pf=>`<tr>${cedCol(pf)}<td>${pf.rep.toFixed(1)}</td></tr>`)}
      ${mkAlerta('😕 Percepción de dificultad alta (&gt;2)',dificultad,['Estudiante','Promedio'],
        pf=>`<tr>${cedCol(pf)}<td>${pf.dif.toFixed(1)}</td></tr>`)}
    </div>
    <div class="card" style="font-size:11px;color:var(--muted)">
      💡 Los umbrales de velocidad de habla, repeticiones y percepción de dificultad son aproximaciones iniciales,
      no vienen de literatura validada para tu contexto específico — trátalos como puntos de partida a calibrar
      con más datos, no como criterios definitivos.
    </div>`;
}

  // Donut clasificación

  // Scatter nota vs riqueza
  const sc=document.getElementById('ch-scatter');

    CH['ch-scatter']=new Chart(sc,{type:'scatter',data:{datasets:[{label:'Estudiantes',data:conNota.map(pf=>({x:(pf.rl*100).toFixed(1),y:pf.np.promedio.toFixed(1)})),backgroundColor:'rgba(94,224,163,0.7)',pointRadius:6}]},options:{...CD,responsive:true,maintainAspectRatio:false,scales:{x:{...CD.scales.x,title:{display:true,text:'Riqueza léxica (%)',color:'#8FAD9B',font:{size:11}}},y:{...CD.scales.y,title:{display:true,text:'Nota promedio',color:'#8FAD9B',font:{size:11}}}}}});

    CH['ch-radar']=new Chart(cr,{type:'radar',data:{labels:['Riqueza léxica','Sim. coseno','Sin muletillas','Con dudas','Negaciones','Sin p.raras'],datasets:[{label:'Grupo',data:[p(est,'riqueza_lexica')*100,p(est,'similitud_coseno')*100,Math.max(0,100-p(est,'frecuencia_muletillas')*1000),p(est,'frecuencia_dudas')*1000,p(est,'frecuencia_negaciones')*1000,Math.max(0,100-p(est,'porcentaje_palabras_raras')*100)],borderColor:'#2BAF7A',backgroundColor:'rgba(43,175,122,0.12)',pointBackgroundColor:'#2BAF7A',pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8FAD9B'}}},scales:{r:{ticks:{color:'#8FAD9B',backdropColor:'transparent',font:{size:9}},grid:{color:'rgba(200,230,210,0.08)'},pointLabels:{color:'#A9C2B4',font:{size:10}}}}}});}
}

function renderEst(reg, allNotas, ced, grupoKeyElegido){
  // El grupo ya NO se auto-detecta del primer registro que aparezca — si la persona
  // está en 2 cursos, eso mezclaría sus audios de ambos sin avisar. Se filtra explícito
  // por el grupo que se eligió en el login.
  const grupoNombreEsperado=GRUPOS[grupoKeyElegido]||'';
  const misRegTodos=reg.filter(r=>String(r.Cedula)===ced&&r.Es_Profesor!=='SÍ'&&r.Grupo===grupoNombreEsperado);
  if(misRegTodos.length===0){
    document.getElementById('dm').innerHTML='<div style="text-align:center;padding:60px"><div style="font-size:40px;margin-bottom:12px">🎙️</div><div style="font-family:var(--font-d);font-size:16px;font-weight:700;margin-bottom:8px">Aún no tienes audios registrados</div><div style="font-size:13px;color:var(--muted)">Cuando envíes tu primer audio verás tus estadísticas aquí.</div></div>';
    return;
  }
  const grupoNombre=grupoNombreEsperado;
  const grupoKey=grupoKeyElegido;
  const notas=allNotas[grupoKey]||[];

  // Mis sesiones (todas, para el selector — el filtro se aplica después)
  const sesionesDisponibles=[...new Set(misRegTodos.map(r=>ns(r.Sesion)))].sort((a,b)=>ordenSesion(a)-ordenSesion(b));
  const misReg=FILTRO_SESION_EST?misRegTodos.filter(r=>ns(r.Sesion)===FILTRO_SESION_EST):misRegTodos;
  const sesEnv=[...new Set(misReg.map(r=>ns(r.Sesion)))];
  const ord=[...misReg].sort((a,b)=>ordenSesion(ns(a.Sesion))-ordenSesion(ns(b.Sesion)));

  // Mis notas (no cambian con el filtro de sesión — la nota no es por audio individual)
  const miNota=notaEst(notas,ced);
  const miNP=calcPromedio(miNota,grupoKey);
  const miCl=clasificar(miNP?.promedio||null);

  // Comparativa grupo — todos los estudiantes del mismo grupo, respetando el mismo filtro de sesión
  let grupoReg=reg.filter(r=>r.Grupo===grupoNombre&&r.Es_Profesor!=='SÍ'&&String(r.Cedula)!=='654321');
  if(FILTRO_SESION_EST) grupoReg=grupoReg.filter(r=>ns(r.Sesion)===FILTRO_SESION_EST);
  const ceds=[...new Set(grupoReg.map(r=>String(r.Cedula)))];
  const grupoPerfiles=ceds.map(c=>{
    const rows=grupoReg.filter(r=>String(r.Cedula)===c);
    const np=calcPromedio(notaEst(notas,c),grupoKey);
    return{ced:c,rl:p(rows,'riqueza_lexica'),mts:p(rows,'conteo_muletillas'),dds:p(rows,'conteo_dudas'),
      neg:p(rows,'conteo_negaciones'),sim:p(rows,'similitud_coseno'),pal:p(rows,'num_palabras'),
      ppm:p(rows,'palabras_por_minuto'),rep:p(rows,'conteo_repeticiones'),dif:p(rows,'conteo_percepcion_dificultad'),np};
  });

  const promedio=calcularPromedioGrupo(grupoPerfiles);
  const criterio=criterioComparacion(grupoPerfiles);
  const yo={rl:p(misReg,'riqueza_lexica'),mts:p(misReg,'conteo_muletillas'),dds:p(misReg,'conteo_dudas'),
    neg:p(misReg,'conteo_negaciones'),sim:p(misReg,'similitud_coseno'),pal:p(misReg,'num_palabras'),
    ppm:p(misReg,'palabras_por_minuto'),rep:p(misReg,'conteo_repeticiones'),
    pausas:p(misReg,'num_pausas'),dif:p(misReg,'conteo_percepcion_dificultad'),
    nota:miNP?.promedio};

  const vars=[
    {k:'rl',l:'Riqueza léxica',f:v=>(v*100).toFixed(1)+'%',max:1},
    {k:'pal',l:'Palabras prom.',f:v=>Math.round(v)+'',max:300},
    {k:'sim',l:'Sim. coseno',f:v=>isNaN(v)||v===0?'—':(v*100).toFixed(0)+'%',max:1},
    {k:'mts',l:'Muletillas',f:v=>v.toFixed(1),max:20},
    {k:'dds',l:'Dudas',f:v=>v.toFixed(1),max:10},
    {k:'neg',l:'Negaciones',f:v=>v.toFixed(1),max:10},
    {k:'ppm',l:'Vel. habla',f:v=>Math.round(v)+' ppm',max:250},
    {k:'rep',l:'Repeticiones',f:v=>v.toFixed(1),max:10},
  ];

  const selectorSesion=`
    <div class="card" style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:12px;color:var(--muted)">📅 Sesión:</span>
      <select class="sel-est" id="filtro-sesion-est" onchange="aplicarFiltroSesionEst()">
        <option value="">Todas (promedio general)</option>
        ${sesionesDisponibles.map(s=>`<option value="${s}" ${s===FILTRO_SESION_EST?'selected':''}>${SS.find(x=>x.v===s)?.l||s}</option>`).join('')}
      </select>
      ${FILTRO_SESION_EST?`<button class="btn-sm" onclick="limpiarFiltroSesionEst()">✕ Limpiar</button>`:''}
    </div>`;

  if(misReg.length===0){
    document.getElementById('dm').innerHTML=`
      <div class="page-title">Mis estadísticas</div>
      <div class="page-sub"><span style="font-family:var(--font-m);color:var(--accent2)">${ced}</span> · ${grupoNombre}</div>
      ${selectorSesion}
      <div class="card" style="text-align:center;padding:40px;color:var(--muted)">No enviaste audio en esa sesión.</div>`;
    return;
  }

  document.getElementById('dm').innerHTML=`
    <div class="page-title">Mis estadísticas</div>
    <div class="page-sub"><span style="font-family:var(--font-m);color:var(--accent2)">${ced}</span> · ${grupoNombre}</div>

    ${selectorSesion}

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Sesiones enviadas</div><div class="kpi-value">${sesEnv.length}</div><div class="kpi-sub">de ${sesionesDisponibles.length} totales</div></div>
      <div class="kpi"><div class="kpi-label">Cumplimiento</div><div class="kpi-value">${Math.round(sesionesDisponibles.length?sesEnv.length/sesionesDisponibles.length*100:0)}%</div><div class="kpi-sub">${sesEnv.length>=sesionesDisponibles.length*0.8?'✓ Excelente':sesEnv.length>=sesionesDisponibles.length*0.5?'Mejorable':'Bajo'}</div></div>
      <div class="kpi"><div class="kpi-label">Riqueza léxica</div><div class="kpi-value">${(yo.rl*100).toFixed(1)}%</div><div class="kpi-sub">${FILTRO_SESION_EST?'esta sesión':'promedio personal'}</div></div>
      ${miNP?`<div class="kpi highlight"><div class="kpi-label">Tu desempeño</div><div class="kpi-value" style="font-size:22px">${miCl.emoji} ${miNP.promedio.toFixed(1)}</div><div class="kpi-sub"><span class="badge ${miCl.cls}">${miCl.label}</span></div></div>`
      :`<div class="kpi"><div class="kpi-label">Desempeño</div><div class="kpi-value" style="font-size:18px">—</div><div class="kpi-sub">Sin nota registrada aún</div></div>`}
    </div>

    <div class="card">
      <div class="card-title">🧭 Qué significa esto</div>
      ${interpretar(yo,promedio,criterio).map(i=>`<div class="interp"><div class="ii">${i.icon}</div><div class="it">${i.text}</div></div>`).join('')}
    </div>

    ${miNP?`
    <div class="card">
      <div class="card-title">📝 Tus notas</div>
      <div class="nota-grid">
        <div class="nota-card"><div class="nota-card-label">Parcial</div><div class="nota-card-value" style="color:var(--accent2)">${miNP.parcial.toFixed(1)}</div></div>
        <div class="nota-card"><div class="nota-card-label">Actividades prom.</div><div class="nota-card-value">${miNP.actividades.toFixed(1)}</div></div>
        <div class="nota-card"><div class="nota-card-label">Nota final</div><div class="nota-card-value" style="color:${miCl.cls==='b-green'?'var(--green)':miCl.cls==='b-yellow'?'var(--yellow)':'var(--red)'}">${miNP.promedio.toFixed(1)}</div></div>
      </div>
    </div>`:''}

    <div class="card">
      <div class="card-title">📅 Sesiones grabadas</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.8;">
        Has enviado <strong style="color:var(--text);font-size:18px;font-family:var(--font-d)">${sesEnv.length}</strong> audios de un total de <strong style="color:var(--text)">${sesionesDisponibles.length}</strong> sesiones del curso.
        ${misReg.length>0?`<br/>Última sesión grabada: <span style="color:var(--accent2);font-family:var(--font-m)">${ns(ord[ord.length-1]?.Sesion||'')}</span>`:''}
      </div>
    </div>

    <div class="grid-2">
      <div class="card"><div class="card-title">📈 Tu riqueza léxica por sesión</div><div class="cw"><canvas id="ch-e-rl"></canvas></div></div>
      <div class="card"><div class="card-title">💬 Muletillas y dudas por sesión</div><div class="cw"><canvas id="ch-e-mts"></canvas></div></div>
    </div>

    <div class="card">
      <div class="card-title">🔍 Tú vs el promedio del grupo</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Comparado contra ${criterio==='nota'?'la nota promedio':'la riqueza léxica promedio (aún sin suficientes notas registradas)'} del grupo${FILTRO_SESION_EST?' · solo esta sesión':''}</div>
      <div class="cmp-legend">
        <span><span class="cmp-dot" style="background:#5EE0A3"></span>Tú</span>
        <span><span class="cmp-dot" style="background:#A78BFA"></span>Promedio del grupo</span>
      </div>
      <div class="cmp-row">
        ${vars.map(v=>{
          const vYo=yo[v.k]||0, vProm=promedio[v.k]||0;
          const mx=Math.max(vYo,vProm,v.max)*1.1||1;
          return `<div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:500">${v.l}</div>
            <div class="cmp-item"><div class="cmp-label">Tú</div><div class="cmp-bar"><div class="cmp-fill me" style="width:${Math.min(100,vYo/mx*100)}%"></div></div><div class="cmp-val">${v.f(vYo)}</div></div>
            <div class="cmp-item" style="margin-top:4px"><div class="cmp-label">Promedio</div><div class="cmp-bar"><div class="cmp-fill prom" style="width:${Math.min(100,vProm/mx*100)}%"></div></div><div class="cmp-val">${v.f(vProm)}</div></div>
          </div>`;
        }).join('<div style="height:1px;background:var(--border);margin:8px 0"></div>')}
      </div>
    </div>

    <div class="card">
      <div class="card-title">📊 Tus promedios ${FILTRO_SESION_EST?'de esta sesión':'generales'}</div>
      <div class="mr">
        <div class="ms"><div class="msl">Riqueza léxica</div><div class="msv">${(yo.rl*100).toFixed(1)}%</div></div>
        <div class="ms"><div class="msl">Muletillas</div><div class="msv">${yo.mts.toFixed(1)}</div><div class="mss">por audio</div></div>
        <div class="ms"><div class="msl">Dudas</div><div class="msv">${yo.dds.toFixed(1)}</div><div class="mss">por audio</div></div>
        <div class="ms"><div class="msl">Negaciones</div><div class="msv">${yo.neg.toFixed(1)}</div><div class="mss">por audio</div></div>
        <div class="ms"><div class="msl">Sim. coseno</div><div class="msv">${isNaN(yo.sim)||yo.sim===0?'—':(yo.sim*100).toFixed(0)+'%'}</div></div>
        <div class="ms"><div class="msl">Palabras prom.</div><div class="msv">${Math.round(yo.pal)}</div></div>
        <div class="ms"><div class="msl">Vel. habla</div><div class="msv">${Math.round(yo.ppm)} ppm</div></div>
        <div class="ms"><div class="msl">Repeticiones</div><div class="msv">${yo.rep.toFixed(1)}</div><div class="mss">por audio</div></div>
        <div class="ms"><div class="msl">Pausas</div><div class="msv">${yo.pausas.toFixed(1)}</div><div class="mss">por audio</div></div>
        <div class="ms"><div class="msl">Perc. dificultad</div><div class="msv">${yo.dif.toFixed(1)}</div><div class="mss">por audio</div></div>
      </div>
    </div>
  `;

  setTimeout(()=>{
    const lb=ord.map(r=>SS.find(s=>s.v===ns(r.Sesion))?.l||ns(r.Sesion));
    mkChart('ch-e-rl','line',lb,[{label:'Riqueza léxica (%)',data:ord.map(r=>(parseFloat(r.riqueza_lexica||0)*100).toFixed(2)),borderColor:'#5EE0A3',backgroundColor:'rgba(94,224,163,0.08)',tension:0.4,fill:true,pointBackgroundColor:'#5EE0A3',pointRadius:4}]);
    mkChart('ch-e-mts','bar',lb,[
      {label:'Muletillas',data:ord.map(r=>r.conteo_muletillas||0),backgroundColor:'rgba(251,191,36,0.7)',borderRadius:4},
      {label:'Dudas',data:ord.map(r=>r.conteo_dudas||0),backgroundColor:'rgba(248,113,113,0.7)',borderRadius:4}
    ]);
  },100);
}

function aplicarFiltroSesionEst(){
  FILTRO_SESION_EST=document.getElementById('filtro-sesion-est').value;
  renderEst(DATA, NOTAS, CED);
}
function limpiarFiltroSesionEst(){
  FILTRO_SESION_EST='';
  renderEst(DATA, NOTAS, CED);
}
</script>
</body>
</html>
