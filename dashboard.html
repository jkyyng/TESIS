<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foné — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#060a12;--bg2:#0b1220;--bg3:#101a2e;--bg4:#162038;
      --border:rgba(99,179,237,0.1);--border2:rgba(99,179,237,0.22);
      --text:#e8f0fe;--muted:#5a7a9e;
      --accent:#3b82f6;--accent2:#60a5fa;
      --green:#34d399;--yellow:#fbbf24;--red:#f87171;
      --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;}
    .header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:rgba(6,10,18,0.9);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;}
    .logo{font-family:var(--font-d);font-weight:800;font-size:20px;letter-spacing:-0.5px;}
    .logo span{color:var(--accent2);}
    .header-right{display:flex;align-items:center;gap:12px;}
    .user-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--accent2);font-family:var(--font-m);}
    .btn-logout{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--font-b);transition:all 0.15s;}
    .btn-logout:hover{color:var(--text);border-color:var(--border2);}
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:420px;width:100%;}
    .login-title{font-family:var(--font-d);font-size:24px;font-weight:800;margin-bottom:6px;}
    .login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.6;}
    .rol-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
    .rol-opt{padding:16px;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;transition:all 0.2s;color:var(--text);}
    .rol-opt:hover{border-color:var(--accent);}
    .rol-opt.selected{border-color:var(--accent);background:rgba(59,130,246,0.1);}
    .rol-opt .ro-icon{font-size:26px;margin-bottom:6px;display:block;}
    .rol-opt .ro-label{font-size:13px;font-weight:600;font-family:var(--font-d);}
    .field-label{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);font-weight:500;display:block;margin-bottom:6px;}
    .field-input{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:14px;font-family:var(--font-b);color:var(--text);width:100%;transition:border-color 0.15s;margin-bottom:12px;}
    .field-input:focus{outline:none;border-color:var(--accent);}
    .field-msg{font-size:12px;min-height:18px;margin-bottom:12px;}
    .field-msg.error{color:var(--red);}
    .field-msg.ok{color:var(--green);}
    .btn-primary{width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:10px;font-family:var(--font-d);font-weight:700;font-size:15px;cursor:pointer;transition:all 0.2s;}
    .btn-primary:hover{background:#2563eb;transform:translateY(-1px);}
    .btn-primary:disabled{background:var(--bg3);color:var(--muted);cursor:not-allowed;transform:none;}
    .main{padding:28px;max-width:1200px;margin:0 auto;}
    .page-title{font-family:var(--font-d);font-size:26px;font-weight:800;margin-bottom:4px;}
    .page-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
    .tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border);}
    .tab{padding:10px 20px;background:none;border:none;color:var(--muted);font-family:var(--font-b);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
    .tab:hover{color:var(--text);}
    .tab.active{color:var(--accent2);border-bottom-color:var(--accent2);}
    .tab-content{display:none;}
    .tab-content.active{display:block;}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
    @media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
    .kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;}
    .kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:8px;}
    .kpi-value{font-family:var(--font-d);font-size:28px;font-weight:800;color:var(--text);}
    .kpi-sub{font-size:11px;color:var(--muted);margin-top:4px;}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px;}
    .card-title{font-family:var(--font-d);font-size:15px;font-weight:700;margin-bottom:16px;color:var(--text);}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
    @media(max-width:700px){.grid-2,.grid-3{grid-template-columns:1fr;}}
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);}
    td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(59,130,246,0.04);}
    .semaforo{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
    .sem-green{background:rgba(52,211,153,0.12);color:var(--green);border:1px solid rgba(52,211,153,0.2);}
    .sem-yellow{background:rgba(251,191,36,0.12);color:var(--yellow);border:1px solid rgba(251,191,36,0.2);}
    .sem-red{background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.2);}
    .sesion-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}
    .sesion-chip{padding:8px 10px;border-radius:8px;font-size:11px;text-align:center;border:1px solid var(--border);}
    .sesion-chip.enviado{background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.3);color:var(--green);}
    .sesion-chip.pendiente{background:rgba(248,113,113,0.07);border-color:rgba(248,113,113,0.2);color:var(--red);}
    .sesion-chip .sc-num{font-family:var(--font-d);font-weight:700;font-size:14px;display:block;}
    .sesion-chip .sc-fecha{color:var(--muted);font-size:10px;}
    .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-msg{text-align:center;color:var(--muted);font-size:13px;padding:10px;}
    .chart-wrap{position:relative;height:240px;}
    .toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 20px;font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all 0.3s;pointer-events:none;}
    .toast.show{opacity:1;transform:translateY(0);}
    .toast.error{border-color:rgba(248,113,113,0.4);color:var(--red);}
    .metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
    @media(max-width:600px){.metric-row{grid-template-columns:repeat(2,1fr);}}
    .metric-sm{background:var(--bg3);border-radius:10px;padding:12px 14px;}
    .metric-sm-label{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:4px;}
    .metric-sm-value{font-family:var(--font-d);font-size:18px;font-weight:700;}
    .metric-sm-sub{font-size:10px;color:var(--muted);margin-top:2px;}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="login-wrap">
  <div class="login-card">
    <div class="login-title">Fo<span style="color:var(--accent2)">né</span> Dashboard</div>
    <div class="login-sub">Accede con tu rol y clave para ver las estadísticas del curso.</div>
    <div class="rol-grid">
      <div class="rol-opt" id="opt-prof" onclick="elegirRol('profesor')">
        <span class="ro-icon">👨‍🏫</span><div class="ro-label">Profesor</div>
      </div>
      <div class="rol-opt" id="opt-est" onclick="elegirRol('estudiante')">
        <span class="ro-icon">🎓</span><div class="ro-label">Estudiante</div>
      </div>
    </div>
    <div id="campo-cedula" style="display:none;">
      <label class="field-label">Número de cédula</label>
      <input class="field-input" type="number" id="inp-cedula" placeholder="0000000000" oninput="validarCedula()"/>
      <div class="field-msg" id="msg-cedula"></div>
    </div>
    <label class="field-label">Clave de acceso</label>
    <input class="field-input" type="password" id="inp-clave" placeholder="_ _ _ _ _" oninput="validarClave()" onkeydown="if(event.key==='Enter') entrar()"/>
    <div class="field-msg" id="msg-clave"></div>
    <button class="btn-primary" id="btn-entrar" onclick="entrar()" disabled>Entrar →</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="screen-dashboard" style="display:none;">
  <div class="header">
    <div class="logo">Fo<span>né</span> <span style="font-size:12px;color:var(--muted);font-family:var(--font-b);font-weight:400;">Dashboard</span></div>
    <div class="header-right">
      <div class="user-badge" id="user-badge"></div>
      <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
    </div>
  </div>
  <div class="main" id="dash-main"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzwAphnxrn82KyesVOLsY8TufJG5bWIwZthd7h6kuYfBg2zVTzOjVS2Vug74ut8pz9O/exec';
const CLAVE_PROFESOR = 'XAJI0'; // Santiago Aparicio — Matemáticas I
const CLAVE_PROFESOR_OMAR = 'OHGI1'; // Omar Palacios — Data Mining

const CLAVES_PROFESORES = {
  'XAJI0': 'Santiago Aparicio — Matemáticas I',
  'OHGI1': 'Omar Palacios — Data Mining',
};
const CLAVES = {
  '1010964822':'Y6DPB','1014482009':'HSAHX','1016946301':'THV3A','1028885900':'3ZMF8',
  '1029220048':'MDD4V','1033097334':'30T9N','1034779730':'T3W5U','1107842573':'ZBIKC',
  '1012344638':'IDKWN','1054287150':'NHJ7X','1022354452':'VG0FN','1141715942':'9XUY4',
  '1034662097':'1IBLJ','1000329597':'H75LX','1147486525':'O6QJI','1025063386':'UJV6O',
  '1010965081':'H9SDB','1096068485':'DW2PC','1013258532':'N9T84','1033102141':'AZYTJ',
  '1011323304':'XEPQ8','1014867126':'5JSG6','1024509578':'5KXVF','1014868162':'1T2TA',
  '1054895361':'LA753','1109549575':'LC58D','1011324854':'RC11E','1031424164':'RTJ5P',
  '1141517449':'HT0HL','1023164975':'9XPSE','1021634975':'IMVIH','1034519179':'CWI64',
  '1030220057':'CIYHE','1018434360':'7UR23','1140916332':'GDPPQ','1032877729':'0Y9DO',
  '1150184438':'M5IGQ','1057570650':'PKI7P','1025531736':'5TB94','1013123384':'874FR',
  '1012378143':'HOCN9','1032877807':'J2QP8','1029141009':'9UZFK','1014990403':'8UT0C',
};
const SESIONES=[
  {v:'09/06/2026',l:'S1'},{v:'10/06/2026',l:'S2'},{v:'11/06/2026',l:'S3'},{v:'12/06/2026',l:'S4'},
  {v:'16/06/2026',l:'S5'},{v:'17/06/2026',l:'S6'},{v:'18/06/2026',l:'S7'},{v:'19/06/2026',l:'S8'},
  {v:'22/06/2026',l:'S9'},{v:'23/06/2026',l:'S10'},{v:'24/06/2026',l:'S11'},{v:'25/06/2026',l:'S12'},
  {v:'26/06/2026',l:'S13'},{v:'30/06/2026',l:'S14'},{v:'01/07/2026',l:'S15'},{v:'02/07/2026',l:'S16'},
  {v:'03/07/2026',l:'S17'},{v:'06/07/2026',l:'S18'},{v:'07/07/2026',l:'S19'},{v:'08/07/2026',l:'S20'},
  {v:'09/07/2026',l:'S21'},{v:'10/07/2026',l:'S22'},
];
const CD={plugins:{legend:{labels:{color:'#5a7a9e',font:{family:'DM Sans',size:11}}}},scales:{x:{ticks:{color:'#5a7a9e',font:{size:10}},grid:{color:'rgba(99,179,237,0.06)'}},y:{ticks:{color:'#5a7a9e',font:{size:10}},grid:{color:'rgba(99,179,237,0.06)'}}}};

let ROL='',CED='',DATA=null,CHARTS={},GRUPO_PROF='';

function elegirRol(r){
  ROL=r;
  document.getElementById('opt-prof').classList.toggle('selected',r==='profesor');
  document.getElementById('opt-est').classList.toggle('selected',r==='estudiante');
  document.getElementById('campo-cedula').style.display=r==='estudiante'?'':'none';
  document.getElementById('inp-clave').value='';
  document.getElementById('msg-clave').textContent='';
  document.getElementById('btn-entrar').disabled=true;
}
function validarCedula(){
  const c=document.getElementById('inp-cedula').value.trim();
  const m=document.getElementById('msg-cedula');
  if(!c){m.textContent='';return;}
  if(CLAVES[c]){m.textContent='✓ Cédula encontrada';m.className='field-msg ok';}
  else{m.textContent='Cédula no registrada';m.className='field-msg error';}
  validarClave();
}
function validarClave(){
  const k=document.getElementById('inp-clave').value.trim().toUpperCase();
  const m=document.getElementById('msg-clave');
  const b=document.getElementById('btn-entrar');
  if(!k){m.textContent='';b.disabled=true;return;}
  if(ROL==='profesor'){
    if(CLAVES_PROFESORES[k]){m.textContent='✓ Acceso autorizado';m.className='field-msg ok';b.disabled=false;}
    else{m.textContent='Clave incorrecta';m.className='field-msg error';b.disabled=true;}
  } else if(ROL==='estudiante'){
    const c=document.getElementById('inp-cedula').value.trim();
    if(!c||!CLAVES[c]){b.disabled=true;return;}
    if(k===CLAVES[c]){m.textContent='✓ Acceso autorizado';m.className='field-msg ok';b.disabled=false;}
    else{m.textContent='Clave incorrecta';m.className='field-msg error';b.disabled=true;}
  }
}
async function entrar(){
  if(ROL==='estudiante') CED=document.getElementById('inp-cedula').value.trim();
  if(ROL==='profesor'){
    const k=document.getElementById('inp-clave').value.trim().toUpperCase();
    GRUPO_PROF=CLAVES_PROFESORES[k]||'';
  }
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-dashboard').style.display='';
  document.getElementById('user-badge').textContent=ROL==='profesor'?'👨‍🏫 '+GRUPO_PROF.split('—')[0].trim():'🎓 '+CED;
  document.getElementById('dash-main').innerHTML='<div class="spinner"></div><div class="loading-msg">Cargando datos...</div>';
  await cargarDatos();
}
function cerrarSesion(){
  ROL='';CED='';DATA=null;
  Object.values(CHARTS).forEach(c=>c.destroy());CHARTS={};
  document.getElementById('screen-dashboard').style.display='none';
  document.getElementById('screen-login').style.display='flex';
  document.getElementById('inp-clave').value='';
  document.getElementById('inp-cedula').value='';
  document.getElementById('msg-clave').textContent='';
  document.getElementById('msg-cedula').textContent='';
  document.getElementById('btn-entrar').disabled=true;
  document.querySelectorAll('.rol-opt').forEach(o=>o.classList.remove('selected'));
  document.getElementById('campo-cedula').style.display='none';
}
async function cargarDatos(){
  try{
    const res=await fetch(`${APPS_SCRIPT_URL}?action=getDashboard`);
    const text=await res.text();
    const data=JSON.parse(text);
    if(!data.ok) throw new Error(data.error||'Error');
    DATA=data.registros;
    if(ROL==='profesor'){
      const datosFiltrados = GRUPO_PROF ? DATA.filter(r=>r.Grupo===GRUPO_PROF) : DATA;
      renderProfesor(datosFiltrados);
    }
    else renderEstudiante(DATA,CED);
  } catch(err){
    document.getElementById('dash-main').innerHTML=`<div style="text-align:center;padding:60px 24px;color:var(--muted);"><div style="font-size:40px;margin-bottom:12px;">⚠️</div><div style="font-size:15px;color:var(--text);margin-bottom:8px;">Error al cargar datos</div><div style="font-size:13px;">${err.message}</div><br/><button onclick="cargarDatos()" style="background:var(--accent);color:white;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-family:var(--font-b);">Reintentar</button></div>`;
  }
}

// ── PROFESOR ──
function renderProfesor(reg){
  const est=reg.filter(r=>r.Es_Profesor!=='SÍ');
  const sesVistas=[...new Set(est.map(r=>r.Sesion))].sort();
  const totalEst=[...new Set(est.map(r=>r.Cedula))].length;
  const cumpl=Math.round((est.length/(totalEst*sesVistas.length))*100);
  document.getElementById('dash-main').innerHTML=`
    <div class="page-title">Panel del Profesor</div>
    <div class="page-sub">Análisis de voz académica · Foné</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Estudiantes</div><div class="kpi-value">${totalEst}</div></div>
      <div class="kpi"><div class="kpi-label">Audios recibidos</div><div class="kpi-value">${est.length}</div><div class="kpi-sub">${sesVistas.length} sesiones</div></div>
      <div class="kpi"><div class="kpi-label">Cumplimiento</div><div class="kpi-value">${cumpl}%</div></div>
      <div class="kpi"><div class="kpi-label">Riqueza léxica prom.</div><div class="kpi-value">${(prom(est,'riqueza_lexica')*100).toFixed(1)}%</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('resumen',this)">Resumen</button>
      <button class="tab" onclick="switchTab('estudiantes',this)">Estudiantes</button>
      <button class="tab" onclick="switchTab('sesiones',this)">Por sesión</button>
      <button class="tab" onclick="switchTab('variables',this)">Variables</button>
    </div>
    <div id="tab-resumen" class="tab-content active">${tabResumen(est,sesVistas)}</div>
    <div id="tab-estudiantes" class="tab-content">${tabEstudiantes(est,sesVistas)}</div>
    <div id="tab-sesiones" class="tab-content">${tabSesiones()}</div>
    <div id="tab-variables" class="tab-content">${tabVariables(est)}</div>
  `;
  setTimeout(()=>renderCharts(est,sesVistas),100);
}

function tabResumen(est,sesVistas){
  const byCed=groupBy(est,'Cedula');
  const alertas=Object.entries(byCed).filter(([c,r])=>r.length/sesVistas.length<0.6);
  return `
    <div class="grid-2">
      <div class="card"><div class="card-title">Riqueza léxica por sesión</div><div class="chart-wrap"><canvas id="chart-rl"></canvas></div></div>
      <div class="card"><div class="card-title">Muletillas y dudas promedio</div><div class="chart-wrap"><canvas id="chart-mts"></canvas></div></div>
    </div>
    <div class="card"><div class="card-title">⚠️ Bajo cumplimiento (&lt;60%)</div>
    ${alertas.length===0
      ? '<div style="color:var(--green);font-size:13px;">✅ Todos los estudiantes tienen buen cumplimiento</div>'
      : `<div class="table-wrap"><table><tr><th>Cédula</th><th>Grupo</th><th>Enviadas</th><th>%</th><th>Estado</th></tr>
        ${alertas.map(([c,r])=>`<tr><td style="font-family:var(--font-m);font-size:12px">${c}</td><td style="font-size:12px">${r[0].Grupo?.split('—')[0]?.trim()||''}</td><td>${r.length}/${sesVistas.length}</td><td>${Math.round(r.length/sesVistas.length*100)}%</td><td><span class="semaforo sem-red">⚠ Bajo</span></td></tr>`).join('')}
        </table></div>`}
    </div>`;
}

function tabEstudiantes(est,sesVistas){
  const byCed=groupBy(est,'Cedula');
  const rows=Object.entries(byCed).map(([c,r])=>{
    const pct=Math.round(r.length/sesVistas.length*100);
    const cls=pct>=80?'sem-green':pct>=50?'sem-yellow':'sem-red';
    const lbl=pct>=80?'✓ Regular':'⚠ Irregular';
    return `<tr><td style="font-family:var(--font-m);font-size:12px">${c}</td>
      <td style="font-size:12px">${r[0].Grupo?.split('—')[0]?.trim()||''}</td>
      <td>${r.length}/${sesVistas.length}</td>
      <td>${(prom(r,'riqueza_lexica')*100).toFixed(1)}%</td>
      <td>${prom(r,'conteo_muletillas').toFixed(1)}</td>
      <td>${prom(r,'conteo_dudas').toFixed(1)}</td>
      <td>${isNaN(prom(r,'similitud_coseno'))||prom(r,'similitud_coseno')===0?'—':(prom(r,'similitud_coseno')*100).toFixed(0)+'%'}</td>
      <td><span class="semaforo ${cls}">${lbl}</span></td></tr>`;
  }).join('');
  return `<div class="card"><div class="card-title">Todos los estudiantes</div><div class="table-wrap"><table>
    <tr><th>Cédula</th><th>Grupo</th><th>Sesiones</th><th>Riqueza léx.</th><th>Muletillas</th><th>Dudas</th><th>Sim. coseno</th><th>Estado</th></tr>
    ${rows}</table></div></div>`;
}

function tabSesiones(){
  return `<div class="grid-2">
    <div class="card"><div class="card-title">Participación por sesión</div><div class="chart-wrap"><canvas id="chart-part"></canvas></div></div>
    <div class="card"><div class="card-title">Evolución riqueza léxica</div><div class="chart-wrap"><canvas id="chart-evol"></canvas></div></div>
  </div>`;
}

function tabVariables(est){
  const vars=[
    {k:'riqueza_lexica',l:'Riqueza léxica',f:v=>(v*100).toFixed(1)+'%'},
    {k:'conteo_muletillas',l:'Muletillas',f:v=>v.toFixed(1)},
    {k:'conteo_dudas',l:'Dudas',f:v=>v.toFixed(1)},
    {k:'conteo_negaciones',l:'Negaciones',f:v=>v.toFixed(1)},
    {k:'porcentaje_palabras_raras',l:'Palabras raras',f:v=>(v*100).toFixed(1)+'%'},
    {k:'similitud_coseno',l:'Sim. coseno',f:v=>isNaN(v)||v===0?'—':(v*100).toFixed(0)+'%'},
  ];
  return `<div class="card"><div class="card-title">Radar del grupo</div><div class="chart-wrap"><canvas id="chart-radar"></canvas></div></div>
  <div class="grid-3">${vars.map(v=>`<div class="card" style="padding:16px;">
    <div class="card-title" style="font-size:12px;margin-bottom:6px;">${v.l}</div>
    <div style="font-family:var(--font-d);font-size:22px;font-weight:800;">${v.f(prom(est,v.k))}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:4px;">promedio del grupo</div>
  </div>`).join('')}</div>`;
}

function renderCharts(est,sesVistas){
  const bySes=groupBy(est,'Sesion');
  const labels=sesVistas.map(s=>SESIONES.find(x=>x.v===s)?.l||s);
  const dataRL=sesVistas.map(s=>{const r=bySes[s]||[];return r.length?(prom(r,'riqueza_lexica')*100).toFixed(2):null;});
  const dataMts=sesVistas.map(s=>{const r=bySes[s]||[];return r.length?prom(r,'conteo_muletillas').toFixed(2):null;});
  const dataDds=sesVistas.map(s=>{const r=bySes[s]||[];return r.length?prom(r,'conteo_dudas').toFixed(2):null;});
  const dataPart=sesVistas.map(s=>(bySes[s]||[]).length);

  const mkLine=(id,lbl,data,color)=>{const c=document.getElementById(id);if(!c)return;CHARTS[id]=new Chart(c,{type:'line',data:{labels,datasets:[{label:lbl,data,borderColor:color,backgroundColor:color.replace(')',',0.1)').replace('rgb','rgba'),tension:0.4,fill:true,pointBackgroundColor:color}]},options:{...CD,responsive:true,maintainAspectRatio:false}});};
  const mkBar=(id,ds)=>{const c=document.getElementById(id);if(!c)return;CHARTS[id]=new Chart(c,{type:'bar',data:{labels,datasets:ds},options:{...CD,responsive:true,maintainAspectRatio:false}});};

  mkLine('chart-rl','Riqueza léxica (%)',dataRL,'rgb(96,165,250)');
  mkBar('chart-mts',[{label:'Muletillas',data:dataMts,backgroundColor:'rgba(251,191,36,0.7)'},{label:'Dudas',data:dataDds,backgroundColor:'rgba(248,113,113,0.7)'}]);
  mkBar('chart-part',[{label:'Estudiantes',data:dataPart,backgroundColor:'rgba(59,130,246,0.7)'}]);
  mkLine('chart-evol','Riqueza léxica (%)',dataRL,'rgb(52,211,153)');

  const cr=document.getElementById('chart-radar');
  if(cr) CHARTS['radar']=new Chart(cr,{type:'radar',data:{labels:['Riqueza léxica','Sim. coseno','Sin muletillas','Dudas','Negaciones','Sin p.raras'],datasets:[{label:'Grupo',data:[prom(est,'riqueza_lexica')*100,prom(est,'similitud_coseno')*100,Math.max(0,100-prom(est,'frecuencia_muletillas')*1000),prom(est,'frecuencia_dudas')*1000,prom(est,'frecuencia_negaciones')*1000,Math.max(0,100-prom(est,'porcentaje_palabras_raras')*100)],borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.15)',pointBackgroundColor:'#3b82f6'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#5a7a9e'}}},scales:{r:{ticks:{color:'#5a7a9e',backdropColor:'transparent'},grid:{color:'rgba(99,179,237,0.1)'},pointLabels:{color:'#8aaace',font:{size:10}}}}}});
}

// ── ESTUDIANTE ──
function renderEstudiante(reg,ced){
  const mis=reg.filter(r=>String(r.Cedula)===ced&&r.Es_Profesor!=='SÍ');
  const sesEnv=[...new Set(mis.map(r=>r.Sesion))];
  const pctC=Math.round(sesEnv.length/SESIONES.length*100);
  if(mis.length===0){document.getElementById('dash-main').innerHTML='<div style="text-align:center;padding:60px 24px;"><div style="font-size:40px;margin-bottom:12px;">🎙️</div><div style="font-size:16px;font-family:var(--font-d);font-weight:700;margin-bottom:8px;">Aún no tienes audios registrados</div></div>';return;}
  const ord=[...mis].sort((a,b)=>a.Sesion.localeCompare(b.Sesion));
  document.getElementById('dash-main').innerHTML=`
    <div class="page-title">Mis estadísticas</div>
    <div class="page-sub">Cédula: <span style="font-family:var(--font-m);color:var(--accent2)">${ced}</span></div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Sesiones enviadas</div><div class="kpi-value">${sesEnv.length}</div><div class="kpi-sub">de ${SESIONES.length} totales</div></div>
      <div class="kpi"><div class="kpi-label">Cumplimiento</div><div class="kpi-value">${pctC}%</div><div class="kpi-sub">${pctC>=80?'✓ Excelente':pctC>=50?'Mejorable':'Bajo'}</div></div>
      <div class="kpi"><div class="kpi-label">Palabras prom.</div><div class="kpi-value">${Math.round(prom(mis,'num_palabras'))}</div><div class="kpi-sub">por audio</div></div>
      <div class="kpi"><div class="kpi-label">Riqueza léxica</div><div class="kpi-value">${(prom(mis,'riqueza_lexica')*100).toFixed(1)}%</div></div>
    </div>
    <div class="card"><div class="card-title">Historial de sesiones</div><div class="sesion-grid">
      ${SESIONES.map(s=>{const env=sesEnv.includes(s.v);return `<div class="sesion-chip ${env?'enviado':'pendiente'}"><span class="sc-num">${s.l}</span><span class="sc-fecha">${s.v}</span><span style="font-size:10px;margin-top:2px;display:block;">${env?'✓ Enviado':'Pendiente'}</span></div>`;}).join('')}
    </div></div>
    <div class="grid-2">
      <div class="card"><div class="card-title">Riqueza léxica por sesión</div><div class="chart-wrap"><canvas id="chart-est-rl"></canvas></div></div>
      <div class="card"><div class="card-title">Muletillas y dudas</div><div class="chart-wrap"><canvas id="chart-est-mts"></canvas></div></div>
    </div>
    <div class="card"><div class="card-title">Tus promedios</div><div class="metric-row">
      <div class="metric-sm"><div class="metric-sm-label">Riqueza léxica</div><div class="metric-sm-value">${(prom(mis,'riqueza_lexica')*100).toFixed(1)}%</div></div>
      <div class="metric-sm"><div class="metric-sm-label">Muletillas</div><div class="metric-sm-value">${prom(mis,'conteo_muletillas').toFixed(1)}</div></div>
      <div class="metric-sm"><div class="metric-sm-label">Dudas</div><div class="metric-sm-value">${prom(mis,'conteo_dudas').toFixed(1)}</div></div>
      <div class="metric-sm"><div class="metric-sm-label">Negaciones</div><div class="metric-sm-value">${prom(mis,'conteo_negaciones').toFixed(1)}</div></div>
      <div class="metric-sm"><div class="metric-sm-label">Sim. coseno</div><div class="metric-sm-value">${isNaN(prom(mis,'similitud_coseno'))||prom(mis,'similitud_coseno')===0?'—':(prom(mis,'similitud_coseno')*100).toFixed(0)+'%'}</div></div>
      <div class="metric-sm"><div class="metric-sm-label">Palabras prom.</div><div class="metric-sm-value">${Math.round(prom(mis,'num_palabras'))}</div></div>
    </div></div>`;
  setTimeout(()=>{
    const lb=ord.map(r=>SESIONES.find(s=>s.v===r.Sesion)?.l||r.Sesion);
    const c1=document.getElementById('chart-est-rl');
    if(c1) CHARTS['est-rl']=new Chart(c1,{type:'line',data:{labels:lb,datasets:[{label:'Riqueza léxica (%)',data:ord.map(r=>(parseFloat(r.riqueza_lexica||0)*100).toFixed(2)),borderColor:'rgb(96,165,250)',backgroundColor:'rgba(96,165,250,0.1)',tension:0.4,fill:true,pointBackgroundColor:'rgb(96,165,250)'}]},options:{...CD,responsive:true,maintainAspectRatio:false}});
    const c2=document.getElementById('chart-est-mts');
    if(c2) CHARTS['est-mts']=new Chart(c2,{type:'bar',data:{labels:lb,datasets:[{label:'Muletillas',data:ord.map(r=>r.conteo_muletillas||0),backgroundColor:'rgba(251,191,36,0.7)'},{label:'Dudas',data:ord.map(r=>r.conteo_dudas||0),backgroundColor:'rgba(248,113,113,0.7)'}]},options:{...CD,responsive:true,maintainAspectRatio:false}});
  },100);
}

function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(DATA){
    const filtrado=GRUPO_PROF?DATA.filter(r=>r.Grupo===GRUPO_PROF):DATA;
    setTimeout(()=>renderCharts(filtrado.filter(r=>r.Es_Profesor!=='SÍ'),[...new Set(filtrado.map(r=>r.Sesion))].sort()),100);
  }
}

function prom(rows,key){const v=rows.map(r=>parseFloat(r[key])).filter(v=>!isNaN(v));return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;}
function groupBy(arr,key){return arr.reduce((acc,r)=>{(acc[r[key]]=acc[r[key]]||[]).push(r);return acc;},{});}
</script>
