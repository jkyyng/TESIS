<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Foné — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080b12; --surface:#0f1420; --surface2:#141b2b; --raised:#1a2338;
  --line:rgba(120,150,200,0.10); --line2:rgba(120,150,200,0.20);
  --ink:#e6ecf7; --ink-dim:#7d8fac; --ink-faint:#4d5972;
  --signal:#4f8ef7; --signal-soft:rgba(79,142,247,0.12);
  --good:#3ecf8e; --good-soft:rgba(62,207,142,0.12);
  --warn:#f5a623; --warn-soft:rgba(245,166,35,0.12);
  --bad:#ef5972; --bad-soft:rgba(239,89,114,0.12);
  --f-d:'Space Grotesk',sans-serif; --f-b:'Inter',sans-serif; --f-m:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--ink);font-family:var(--f-b);min-height:100vh;font-size:14px;line-height:1.5;}
::selection{background:var(--signal-soft);}

.wf{height:20px;display:flex;align-items:center;gap:2px;opacity:0.5;margin:2px 0;}
.wf i{flex:1;background:var(--signal);border-radius:2px;opacity:0.35;}

.login-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;background:
  radial-gradient(ellipse 600px 400px at 20% 10%, rgba(79,142,247,0.10), transparent 60%),
  radial-gradient(ellipse 500px 400px at 85% 90%, rgba(62,207,142,0.06), transparent 60%);}
.login-box{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:44px 40px;max-width:400px;width:100%;position:relative;z-index:1;}
.login-mark{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.login-mark .wave{display:flex;align-items:center;gap:2px;height:22px;}
.login-mark .wave i{width:3px;background:var(--signal);border-radius:2px;}
.login-mark .wave i:nth-child(1){height:40%;} .login-mark .wave i:nth-child(2){height:100%;}
.login-mark .wave i:nth-child(3){height:60%;} .login-mark .wave i:nth-child(4){height:85%;}
.login-mark .wave i:nth-child(5){height:35%;}
.login-title{font-family:var(--f-d);font-weight:700;font-size:24px;letter-spacing:-0.02em;}
.login-desc{font-size:13px;color:var(--ink-dim);margin:6px 0 28px;line-height:1.6;}
.role-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px;}
.role-card{padding:16px 10px;background:var(--surface2);border:1px solid var(--line);border-radius:12px;cursor:pointer;text-align:center;transition:.15s;}
.role-card:hover{border-color:var(--line2);}
.role-card.on{border-color:var(--signal);background:var(--signal-soft);}
.role-card .ic{font-size:22px;display:block;margin-bottom:5px;}
.role-card .lb{font-family:var(--f-d);font-weight:600;font-size:12.5px;}
.fld-lb{font-size:10.5px;text-transform:uppercase;letter-spacing:0.9px;color:var(--ink-faint);font-weight:600;display:block;margin-bottom:7px;}
.fld{background:var(--surface2);border:1.5px solid var(--line);border-radius:10px;padding:12px 15px;font-size:14px;font-family:var(--f-b);color:var(--ink);width:100%;transition:.15s;margin-bottom:8px;}
.fld:focus{outline:none;border-color:var(--signal);}
.fld-msg{font-size:11.5px;min-height:16px;margin-bottom:14px;font-weight:500;}
.fld-msg.err{color:var(--bad);} .fld-msg.ok{color:var(--good);}
.btn-go{width:100%;padding:13px;background:var(--signal);color:#fff;border:none;border-radius:10px;font-family:var(--f-d);font-weight:600;font-size:14px;cursor:pointer;transition:.15s;}
.btn-go:hover:not(:disabled){background:#3d7ce0;}
.btn-go:disabled{background:var(--surface2);color:var(--ink-faint);cursor:not-allowed;}

.shell{display:flex;min-height:100vh;}
.side{width:216px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.side-top{padding:22px 20px 18px;border-bottom:1px solid var(--line);}
.side-mark{display:flex;align-items:center;gap:8px;font-family:var(--f-d);font-weight:700;font-size:18px;}
.side-mark .wave{display:flex;align-items:center;gap:1.5px;height:16px;}
.side-mark .wave i{width:2.5px;background:var(--signal);border-radius:1px;}
.side-mark .wave i:nth-child(1){height:40%;} .side-mark .wave i:nth-child(2){height:100%;}
.side-mark .wave i:nth-child(3){height:55%;} .side-mark .wave i:nth-child(4){height:80%;}
.side-sub{font-size:11px;color:var(--ink-faint);margin-top:3px;}
.side-nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;color:var(--ink-dim);font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:var(--f-b);transition:.12s;}
.nav-item:hover{background:var(--surface2);color:var(--ink);}
.nav-item.on{background:var(--signal-soft);color:var(--signal);font-weight:600;}
.nav-item .ic{font-size:15px;width:18px;text-align:center;}
.side-bottom{padding:14px 20px 18px;border-top:1px solid var(--line);}
.who{font-family:var(--f-m);font-size:11px;color:var(--ink-dim);margin-bottom:10px;word-break:break-all;}
.btn-out{width:100%;padding:8px;background:none;border:1px solid var(--line);border-radius:8px;color:var(--ink-faint);font-size:12px;cursor:pointer;font-family:var(--f-b);transition:.15s;}
.btn-out:hover{color:var(--ink);border-color:var(--line2);}

.content{flex:1;min-width:0;}
.topbar{padding:20px 32px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(8,11,18,0.85);backdrop-filter:blur(12px);z-index:10;}
.tb-title{font-family:var(--f-d);font-weight:700;font-size:20px;letter-spacing:-0.01em;}
.tb-sub{font-size:12.5px;color:var(--ink-dim);margin-top:2px;}
.main{padding:28px 32px 60px;max-width:1140px;}

.mnav{display:none;}
@media(max-width:880px){
  .side{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:.25s;z-index:200;}
  .side.open{transform:translateX(0);}
  .mnav{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--line);}
  .mnav button{background:var(--surface2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:7px 11px;font-size:16px;cursor:pointer;}
  .main{padding:20px 18px 60px;}
  .topbar{padding:16px 18px;}
}

.pane{display:none;}
.pane.on{display:block;animation:fadein .2s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
@media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px 20px;}
.kpi.emph{border-color:rgba(79,142,247,0.28);background:linear-gradient(160deg,var(--signal-soft),transparent);}
.kpi-lb{font-size:10.5px;text-transform:uppercase;letter-spacing:0.7px;color:var(--ink-faint);font-weight:600;margin-bottom:9px;}
.kpi-val{font-family:var(--f-d);font-size:27px;font-weight:700;letter-spacing:-0.01em;}
.kpi-sb{font-size:11px;color:var(--ink-dim);margin-top:4px;}

.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px 24px;margin-bottom:16px;}
.card-tt{font-family:var(--f-d);font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
@media(max-width:760px){.grid2,.grid3{grid-template-columns:1fr;}}

.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{text-align:left;padding:9px 13px;font-size:10.5px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap;}
td{padding:10px 13px;border-bottom:1px solid var(--line);color:var(--ink);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(79,142,247,0.03);}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:600;}
.p-good{background:var(--good-soft);color:var(--good);} .p-warn{background:var(--warn-soft);color:var(--warn);}
.p-bad{background:var(--bad-soft);color:var(--bad);} .p-signal{background:var(--signal-soft);color:var(--signal);}
.p-mute{background:rgba(125,143,172,0.12);color:var(--ink-dim);}

.cmp-legend{display:flex;gap:18px;margin-bottom:16px;font-size:11.5px;color:var(--ink-dim);}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}
.cmp-block{margin-bottom:16px;}
.cmp-block:last-child{margin-bottom:0;}
.cmp-name{font-size:11.5px;color:var(--ink-dim);margin-bottom:7px;font-weight:500;}
.cmp-line{display:grid;grid-template-columns:76px 1fr 48px;align-items:center;gap:9px;margin-bottom:5px;}
.cmp-tag{font-size:10.5px;color:var(--ink-faint);text-align:right;}
.cmp-track{background:var(--surface2);border-radius:4px;height:7px;overflow:hidden;}
.cmp-fill{height:100%;border-radius:4px;transition:width .5s;}
.cmp-num{font-family:var(--f-m);font-size:10.5px;text-align:right;}

.ms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:600px){.ms-grid{grid-template-columns:repeat(2,1fr);}}
.ms{background:var(--surface2);border-radius:11px;padding:13px 15px;}
.ms-lb{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);margin-bottom:5px;font-weight:600;}
.ms-val{font-family:var(--f-d);font-size:18px;font-weight:700;}

.note-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.note-card{background:var(--surface2);border-radius:12px;padding:16px;text-align:center;}
.note-lb{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);margin-bottom:7px;font-weight:600;}
.note-val{font-family:var(--f-d);font-size:22px;font-weight:700;}

.cw{position:relative;height:220px;}
.cw-lg{position:relative;height:270px;}

.spin{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--signal);border-radius:50%;animation:sp .7s linear infinite;margin:60px auto 14px;}
@keyframes sp{to{transform:rotate(360deg)}}
.spin-msg{text-align:center;color:var(--ink-dim);font-size:12.5px;}

.empty{text-align:center;padding:56px 24px;color:var(--ink-dim);}
.empty .ic{font-size:36px;margin-bottom:12px;}
.empty .tt{font-family:var(--f-d);font-size:15px;font-weight:600;color:var(--ink);margin-bottom:6px;}

.filters{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.filters{grid-template-columns:1fr;}}

.detail-item{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:14px;}
.di-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.di-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.di-cedula{font-family:var(--f-m);font-size:11.5px;color:var(--ink-dim);}
.di-fecha{font-size:11px;color:var(--ink-faint);}
.di-quick{display:flex;gap:13px;font-size:11px;color:var(--ink-dim);}
.transcript-box{font-size:13px;line-height:1.85;color:var(--ink);background:var(--surface2);border-radius:11px;padding:15px 17px;}
.hl{padding:1px 3px;border-radius:4px;font-weight:600;}
.hl-mul{background:rgba(245,166,35,0.22);color:#ffc266;}
.hl-dud{background:rgba(167,139,250,0.22);color:#c4b0fb;}
.hl-neg{background:rgba(239,89,114,0.22);color:#ff90a3;}
.hl-rar{background:rgba(79,142,247,0.22);color:#8fb8fb;}
.hl-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--ink-dim);margin-bottom:10px;}
.hl-legend span{display:flex;align-items:center;gap:5px;}
.hl-legend i{width:10px;height:10px;border-radius:3px;display:inline-block;}
.audio-link{font-size:11px;color:var(--signal);text-decoration:none;font-weight:500;}
.audio-link:hover{text-decoration:underline;}
</style>
</head>
<body>

<div id="sc-login" class="login-shell">
  <div class="login-box">
    <div class="login-mark">
      <span class="wave"><i></i><i></i><i></i><i></i><i></i></span>
      <span class="login-title">Fon<span style="color:var(--signal)">é</span></span>
    </div>
    <div class="login-desc">Panel de análisis de voz académica.</div>
    <div class="role-pair">
      <div class="role-card" id="opt-p" onclick="elegirRol('p')"><span class="ic">🎙️</span><div class="lb">Profesor</div></div>
      <div class="role-card" id="opt-e" onclick="elegirRol('e')"><span class="ic">🎓</span><div class="lb">Estudiante</div></div>
    </div>
    <div id="cc" style="display:none;">
      <label class="fld-lb">Cédula</label>
      <input class="fld" type="number" id="ic" placeholder="0000000000" oninput="vC()" onkeydown="if(event.key==='Enter')entrar()"/>
      <div class="fld-msg" id="mc"></div>
    </div>
    <label class="fld-lb">Clave de acceso</label>
    <input class="fld" type="password" id="ik" placeholder="•••••" oninput="vK()" onkeydown="if(event.key==='Enter')entrar()" style="letter-spacing:3px;font-family:var(--f-m)"/>
    <div class="fld-msg" id="mk"></div>
    <button class="btn-go" id="be" onclick="entrar()" disabled>Entrar</button>
  </div>
</div>

<div id="sc-app" style="display:none;">
  <div class="shell">
    <div class="mnav">
      <button onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <span style="font-family:var(--f-d);font-weight:700;">Fo<span style="color:var(--signal)">né</span></span>
    </div>
    <aside class="side" id="sidebar">
      <div class="side-top">
        <div class="side-mark"><span class="wave"><i></i><i></i><i></i><i></i></span>Fon<span style="color:var(--signal)">é</span></div>
        <div class="side-sub">Análisis de voz académica</div>
      </div>
      <nav class="side-nav" id="nav"></nav>
      <div class="side-bottom">
        <div class="who" id="who"></div>
        <button class="btn-out" onclick="salir()">Cerrar sesión</button>
      </div>
    </aside>
    <div class="content">
      <div class="topbar">
        <div class="tb-title" id="tb-title">—</div>
        <div class="tb-sub" id="tb-sub"></div>
      </div>
      <div class="main" id="main"></div>
    </div>
  </div>
</div>

<script>
const URL_AS='https://script.google.com/macros/s/AKfycbw12TxEJDssZ8JYEx7GH7nd0TD5IfELgqki5KmuCbRp7kDlPIdyVO8Aka0zGtQlbIAe0A/exec';
const KP={'XAJI0':{grupo:'Santiago Aparicio — Matemáticas I',key:'santiago'},'OHGI1':{grupo:'Omar Palacios — Data Mining',key:'omar'}};
const KE={'1010964822':'Y6DPB','1014482009':'HSAHX','1016946301':'THV3A','1028885900':'3ZMF8','1029220048':'MDD4V','1033097334':'30T9N','1034779730':'T3W5U','1107842573':'ZBIKC','1012344638':'IDKWN','1054287150':'NHJ7X','1022354452':'VG0FN','1141715942':'9XUY4','1034662097':'1IBLJ','1000329597':'H75LX','1147486525':'O6QJI','1025063386':'UJV6O','1010965081':'H9SDB','1096068485':'DW2PC','1013258532':'N9T84','1033102141':'AZYTJ','1011323304':'XEPQ8','1014867126':'5JSG6','1024509578':'5KXVF','1014868162':'1T2TA','1054895361':'LA753','1109549575':'LC58D','1011324854':'RC11E','1031424164':'RTJ5P','1141517449':'HT0HL','1023164975':'9XPSE','1021634975':'IMVIH','1034519179':'CWI64','1030220057':'CIYHE','1018434360':'7UR23','1140916332':'GDPPQ','1032877729':'0Y9DO','1150184438':'M5IGQ','1057570650':'PKI7P','1025531736':'5TB94','1013123384':'874FR','1012378143':'HOCN9','1032877807':'J2QP8','1029141009':'9UZFK','1014990403':'8UT0C'};
const SS=[{v:'09/06/2026',l:'S1'},{v:'10/06/2026',l:'S2'},{v:'11/06/2026',l:'S3'},{v:'12/06/2026',l:'S4'},{v:'16/06/2026',l:'S5'},{v:'17/06/2026',l:'S6'},{v:'18/06/2026',l:'S7'},{v:'19/06/2026',l:'S8'},{v:'22/06/2026',l:'S9'},{v:'23/06/2026',l:'S10'},{v:'24/06/2026',l:'S11'},{v:'25/06/2026',l:'S12'},{v:'26/06/2026',l:'S13'},{v:'30/06/2026',l:'S14'},{v:'01/07/2026',l:'S15'},{v:'02/07/2026',l:'S16'},{v:'03/07/2026',l:'S17'},{v:'06/07/2026',l:'S18'},{v:'07/07/2026',l:'S19'},{v:'08/07/2026',l:'S20'},{v:'09/07/2026',l:'S21'},{v:'10/07/2026',l:'S22'}];
const CD={plugins:{legend:{labels:{color:'#7d8fac',font:{family:'Inter',size:11}}}},scales:{x:{ticks:{color:'#7d8fac',font:{size:10},maxRotation:0},grid:{color:'rgba(120,150,200,0.05)'}},y:{ticks:{color:'#7d8fac',font:{size:10}},grid:{color:'rgba(120,150,200,0.05)'}}}};

let ROL='',CED='',DATA=null,NOTAS=null,GP='',GK='',CH={};

function elegirRol(r){
  ROL=r;
  document.getElementById('opt-p').classList.toggle('on',r==='p');
  document.getElementById('opt-e').classList.toggle('on',r==='e');
  document.getElementById('cc').style.display=r==='e'?'':'none';
  document.getElementById('ik').value='';document.getElementById('mk').textContent='';
  document.getElementById('be').disabled=true;
}
function vC(){
  const c=document.getElementById('ic').value.trim();
  const m=document.getElementById('mc');
  if(!c){m.textContent='';return;}
  m.textContent=KE[c]?'✓ Cédula encontrada':'Cédula no registrada';
  m.className='fld-msg '+(KE[c]?'ok':'err');
  vK();
}
function vK(){
  const k=document.getElementById('ik').value.trim().toUpperCase();
  const m=document.getElementById('mk'), b=document.getElementById('be');
  if(!k){m.textContent='';b.disabled=true;return;}
  if(ROL==='p'){const ok=!!KP[k];m.textContent=ok?'✓ Acceso autorizado':'Clave incorrecta';m.className='fld-msg '+(ok?'ok':'err');b.disabled=!ok;}
  else{const c=document.getElementById('ic').value.trim();const ok=KE[c]&&k===KE[c];m.textContent=ok?'✓ Acceso autorizado':'Clave incorrecta';m.className='fld-msg '+(ok?'ok':'err');b.disabled=!ok;}
}
async function entrar(){
  const k=document.getElementById('ik').value.trim().toUpperCase();
  if(ROL==='p'){GP=KP[k].grupo;GK=KP[k].key;} else CED=document.getElementById('ic').value.trim();
  document.getElementById('sc-login').style.display='none';
  document.getElementById('sc-app').style.display='';
  document.getElementById('who').textContent=ROL==='p'?'👨‍🏫 '+GP:'🎓 '+CED;
  buildNav();
  document.getElementById('main').innerHTML='<div class="spin"></div><div class="spin-msg">Cargando datos…</div>';
  await cargar();
}
function salir(){
  ROL='';CED='';DATA=null;NOTAS=null;GP='';GK='';
  Object.values(CH).forEach(c=>{try{c.destroy();}catch(e){}});CH={};
  document.getElementById('sc-app').style.display='none';
  document.getElementById('sc-login').style.display='flex';
  document.getElementById('ik').value='';document.getElementById('ic').value='';
  document.getElementById('mk').textContent='';document.getElementById('mc').textContent='';
  document.getElementById('be').disabled=true;
  document.querySelectorAll('.role-card').forEach(o=>o.classList.remove('on'));
  document.getElementById('cc').style.display='none';
}

const NAV_P=[
  {id:'resumen',ic:'📊',lb:'Resumen'},
  {id:'estudiantes',ic:'👥',lb:'Estudiantes'},
  {id:'sesiones',ic:'📅',lb:'Sesiones'},
  {id:'variables',ic:'🔬',lb:'Variables'},
  {id:'alertas',ic:'⚠️',lb:'Alertas'},
  {id:'transcripciones',ic:'📝',lb:'Transcripciones'},
  {id:'detalle',ic:'🗂️',lb:'Detalle completo'},
];
function buildNav(){
  const nav=document.getElementById('nav');
  if(ROL==='p'){
    nav.innerHTML=NAV_P.map((n,i)=>`<button class="nav-item ${i===0?'on':''}" id="nav-${n.id}" onclick="goTab('${n.id}')"><span class="ic">${n.ic}</span>${n.lb}</button>`).join('');
    document.getElementById('tb-title').textContent=GP;
    document.getElementById('tb-sub').textContent='Panel del profesor';
  } else {

async function cargar(){
  try{
    const res=await fetch(`${URL_AS}?action=getDashboard`);
    const d=await res.json();
    if(!d.ok)throw new Error(d.error||'Error');
    DATA=d.registros; NOTAS=d.notas||{};

function ns(s){return String(s||'').split(' ')[0].trim();}
function p(rows,key){const v=rows.map(r=>parseFloat(r[key])).filter(v=>!isNaN(v));return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;}
function gb(arr,key){return arr.reduce((acc,r)=>{const k=ns(r[key]);(acc[k]=acc[k]||[]).push(r);return acc;},{});}
function notaEst(notas,cedula){if(!notas||!notas.length)return null;return notas.find(r=>String(r['Documento']||r['Cedula']||r['cedula']||'')===String(cedula))||null;}
function calcPromedio(notaRow){
  if(!notaRow)return null;
  const excluir=['Documento','Cedula','cedula','Nombre','correo','Email','email'];
  const cols=Object.keys(notaRow).filter(k=>!excluir.includes(k));
  const colP=cols.find(k=>k.toUpperCase().includes('PARCIAL'));
  if(!colP)return null;
  const parcial=parseFloat(notaRow[colP]||0);
  if(!(parcial>0))return null;
  const others=cols.filter(k=>k!==colP).map(k=>parseFloat(notaRow[k]||0)).filter(v=>v>0);
  const promA=others.length?others.reduce((a,b)=>a+b,0)/others.length:0;
  return{parcial,actividades:promA,promedio:(parcial*0.5+promA*0.5)};
}
function clasificar(prom){
  if(prom===null||isNaN(prom))return{cls:'p-mute',label:'Sin nota',emoji:'—'};
  const n=prom>10?prom/10:prom;
  if(n>=4.0)return{cls:'p-good',label:'Alto',emoji:'●'};
  if(n>=3.0)return{cls:'p-warn',label:'Medio',emoji:'●'};
  return{cls:'p-bad',label:'Bajo',emoji:'●'};
}

}

const LST_MUL=['eh','ah','este','mmm','pues','osea','o sea','digamos'];
const LST_DUD=['no se','nose','no recuerdo','dificil','difisil','complicado','confuso','no entendi','creo','tal vez'];
const LST_NEG=['no','nunca','jamas'];

function quitarTildes(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'');}

function highlightText(texto){
  if(!texto)return '(sin transcripción)';
  // Calcular palabras raras (frecuencia 1 en el propio texto)
  const limpio=quitarTildes(texto.toLowerCase()).replace(/[^a-z\s]/g,' ').replace(/\s+/g,' ').trim();
  const tokens=limpio.split(' ').filter(Boolean);
  const freq={};
  tokens.forEach(t=>freq[t]=(freq[t]||0)+1);
  const raras=new Set(Object.keys(freq).filter(k=>freq[k]===1));

  // Construir regex combinando todas las frases (más largas primero para evitar solapes)
  const todas=[...LST_MUL.map(w=>({w,cls:'hl-mul'})),...LST_DUD.map(w=>({w,cls:'hl-dud'})),...LST_NEG.map(w=>({w,cls:'hl-neg'}))]
    .sort((a,b)=>b.w.length-a.w.length);

  // Tokenizar el texto original preservando puntuación, resaltando por palabra
  const palabrasOriginal=texto.split(/(\s+)/);
  return palabrasOriginal.map(tok=>{
    if(/^\s+$/.test(tok)||tok==='')return tok;
    const limpio1=quitarTildes(tok.toLowerCase()).replace(/[^a-z]/g,'');
    if(!limpio1)return esc(tok);
    // Chequear frases de dos palabras las maneja el regex global aparte; aquí solo palabra suelta
    if(LST_NEG.includes(limpio1))return `<span class="hl hl-neg">${esc(tok)}</span>`;
    if(LST_MUL.includes(limpio1))return `<span class="hl hl-mul">${esc(tok)}</span>`;
    if(LST_DUD.includes(limpio1))return `<span class="hl hl-dud">${esc(tok)}</span>`;
    if(raras.has(limpio1)&&limpio1.length>3)return `<span class="hl hl-rar">${esc(tok)}</span>`;
    return esc(tok);
  }).join('')
  // Resaltar frases de 2+ palabras (no se, o sea, tal vez, etc.) sobre el resultado ya escapado
  .replace(/\b(no se|o sea|tal vez|no recuerdo|no entendi|no entendí)\b/gi,m=>`<span class="hl hl-dud">${m}</span>`);
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hlLegend(){
  return `<div class="hl-legend">
    <span><i style="background:rgba(245,166,35,0.5)"></i>Muletillas</span>
    <span><i style="background:rgba(167,139,250,0.5)"></i>Dudas</span>
    <span><i style="background:rgba(239,89,114,0.5)"></i>Negaciones</span>
    <span><i style="background:rgba(79,142,247,0.5)"></i>Palabras raras (única aparición)</span>
  </div>`;
}

function renderChartsProf(est,sesVistas,perfiles){
  const bySes=gb(est,'Sesion');
  const lbl=sesVistas.map(s=>SS.find(x=>x.v===s)?.l||s);
  const dataRL=sesVistas.map(s=>{const r=bySes[s]||[];return r.length?(p(r,'riqueza_lexica')*100).toFixed(2):null;});
  const dataMts=sesVistas.map(s=>{const r=bySes[s]||[];return r.length?p(r,'conteo_muletillas').toFixed(2):null;});
  const dataDds=sesVistas.map(s=>{const r=bySes[s]||[];return r.length?p(r,'conteo_dudas').toFixed(2):null;});
  const dataPart=sesVistas.map(s=>(bySes[s]||[]).length);
  const dataSim=sesVistas.map(s=>{const r=bySes[s]||[];const v=p(r,'similitud_coseno');return r.length&&v?(v*100).toFixed(2):null;});

  mkChart('ch-rl','line',lbl,[{label:'Riqueza léxica (%)',data:dataRL,borderColor:'#4f8ef7',backgroundColor:'rgba(79,142,247,0.08)',tension:0.4,fill:true,pointBackgroundColor:'#4f8ef7',pointRadius:4}]);
  mkChart('ch-mts','bar',lbl,[{label:'Muletillas',data:dataMts,backgroundColor:'rgba(245,166,35,0.7)',borderRadius:4},{label:'Dudas',data:dataDds,backgroundColor:'rgba(239,89,114,0.7)',borderRadius:4}]);
  mkChart('ch-part','bar',lbl,[{label:'Estudiantes',data:dataPart,backgroundColor:'rgba(79,142,247,0.7)',borderRadius:4}]);
  mkChart('ch-evol','line',lbl,[{label:'Riqueza léxica (%)',data:dataRL,borderColor:'#3ecf8e',backgroundColor:'rgba(62,207,142,0.08)',tension:0.4,fill:true,pointBackgroundColor:'#3ecf8e',pointRadius:4}]);
  mkChart('ch-sim','line',lbl,[{label:'Similitud coseno (%)',data:dataSim,borderColor:'#a78bfa',backgroundColor:'rgba(167,139,250,0.08)',tension:0.4,fill:true,pointBackgroundColor:'#a78bfa',pointRadius:4}]);

  const nA=perfiles.filter(x=>x.cl.label==='Alto').length, nM=perfiles.filter(x=>x.cl.label==='Medio').length;
  const nB=perfiles.filter(x=>x.cl.label==='Bajo').length, nS=perfiles.filter(x=>x.cl.label==='Sin nota').length;
  const cd=document.getElementById('ch-donut');
  if(cd){try{if(CH['ch-donut'])CH['ch-donut'].destroy();}catch(e){}
    CH['ch-donut']=new Chart(cd,{type:'doughnut',data:{labels:['Alto','Medio','Bajo','Sin nota'],datasets:[{data:[nA,nM,nB,nS],backgroundColor:['rgba(62,207,142,0.85)','rgba(245,166,35,0.85)','rgba(239,89,114,0.85)','rgba(125,143,172,0.4)'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7d8fac',font:{family:'Inter',size:11}}}}}});}

  const sc=document.getElementById('ch-scatter');
  if(sc){const conNota=perfiles.filter(x=>x.np);
    try{if(CH['ch-scatter'])CH['ch-scatter'].destroy();}catch(e){}
    CH['ch-scatter']=new Chart(sc,{type:'scatter',data:{datasets:[{label:'Estudiantes',data:conNota.map(x=>({x:(x.rl*100).toFixed(1),y:x.np.promedio.toFixed(1)})),backgroundColor:'rgba(79,142,247,0.7)',pointRadius:6}]},options:{...CD,responsive:true,maintainAspectRatio:false,scales:{x:{...CD.scales.x,title:{display:true,text:'Riqueza léxica (%)',color:'#7d8fac',font:{size:11}}},y:{...CD.scales.y,title:{display:true,text:'Nota promedio',color:'#7d8fac',font:{size:11}}}}}});}

  const cr=document.getElementById('ch-radar');
  if(cr){try{if(CH['ch-radar'])CH['ch-radar'].destroy();}catch(e){}
    CH['ch-radar']=new Chart(cr,{type:'radar',data:{labels:['Riqueza léxica','Sim. coseno','Sin muletillas','Con dudas','Negaciones','Sin p.raras'],datasets:[{label:'Grupo',data:[p(est,'riqueza_lexica')*100,p(est,'similitud_coseno')*100,Math.max(0,100-p(est,'frecuencia_muletillas')*1000),p(est,'frecuencia_dudas')*1000,p(est,'frecuencia_negaciones')*1000,Math.max(0,100-p(est,'porcentaje_palabras_raras')*100)],borderColor:'#4f8ef7',backgroundColor:'rgba(79,142,247,0.12)',pointBackgroundColor:'#4f8ef7',pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7d8fac'}}},scales:{r:{ticks:{color:'#7d8fac',backdropColor:'transparent',font:{size:9}},grid:{color:'rgba(120,150,200,0.08)'},pointLabels:{color:'#a8b7cf',font:{size:10}}}}}});}
}

function renderEst(reg,allNotas,ced){
  const misReg=reg.filter(r=>String(r.Cedula)===ced&&r.Es_Profesor!=='SÍ');
  if(!misReg.length){
    document.getElementById('main').innerHTML='<div class="empty"><div class="ic">🎙️</div><div class="tt">Aún no tienes audios registrados</div><div style="font-size:12.5px">Cuando envíes tu primer audio verás tus estadísticas aquí.</div></div>';
    return;
  }
  const grupoNombre=misReg[0].Grupo||'';
  const grupoKey=grupoNombre.includes('Santiago')?'santiago':'omar';
  const notas=allNotas[grupoKey]||[];
  const sesEnv=[...new Set(misReg.map(r=>ns(r.Sesion)))];
  const ord=[...misReg].sort((a,b)=>ns(a.Sesion).localeCompare(ns(b.Sesion)));
  const miNota=notaEst(notas,ced), miNP=calcPromedio(miNota), miCl=clasificar(miNP?.promedio||null);

  const grupoReg=reg.filter(r=>r.Grupo===grupoNombre&&r.Es_Profesor!=='SÍ'&&String(r.Cedula)!=='654321');
  const ceds=[...new Set(grupoReg.map(r=>String(r.Cedula)))];
  const perfilesGrupo=ceds.map(c=>{const rows=grupoReg.filter(r=>String(r.Cedula)===c);return{ced:c,rl:p(rows,'riqueza_lexica'),mts:p(rows,'conteo_muletillas'),dds:p(rows,'conteo_dudas'),neg:p(rows,'conteo_negaciones'),sim:p(rows,'similitud_coseno'),pal:p(rows,'num_palabras')};});
  const mejor=perfilesGrupo.reduce((a,b)=>b.rl>a.rl?b:a,perfilesGrupo[0]||{});
  const peor=perfilesGrupo.reduce((a,b)=>b.rl<a.rl?b:a,perfilesGrupo[0]||{});
  const yo={rl:p(misReg,'riqueza_lexica'),mts:p(misReg,'conteo_muletillas'),dds:p(misReg,'conteo_dudas'),neg:p(misReg,'conteo_negaciones'),sim:p(misReg,'similitud_coseno'),pal:p(misReg,'num_palabras')};

  const vars=[
    {k:'rl',l:'Riqueza léxica',f:v=>(v*100).toFixed(1)+'%',max:1},
    {k:'pal',l:'Palabras prom.',f:v=>Math.round(v)+'',max:300},
    {k:'sim',l:'Sim. coseno',f:v=>isNaN(v)||v===0?'—':(v*100).toFixed(0)+'%',max:1},
    {k:'mts',l:'Muletillas',f:v=>v.toFixed(1),max:20},
    {k:'dds',l:'Dudas',f:v=>v.toFixed(1),max:10},
    {k:'neg',l:'Negaciones',f:v=>v.toFixed(1),max:10},
  ];

  document.getElementById('main').innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="kpi-lb">Sesiones enviadas</div><div class="kpi-val">${sesEnv.length}</div><div class="kpi-sb">de ${SS.length} totales</div></div>
      <div class="kpi"><div class="kpi-lb">Cumplimiento</div><div class="kpi-val">${Math.round(sesEnv.length/SS.length*100)}%</div><div class="kpi-sb">${sesEnv.length>=SS.length*0.8?'Excelente':sesEnv.length>=SS.length*0.5?'Mejorable':'Bajo'}</div></div>
      <div class="kpi"><div class="kpi-lb">Riqueza léxica</div><div class="kpi-val">${(yo.rl*100).toFixed(1)}%</div><div class="kpi-sb">promedio personal</div></div>
      ${miNP?`<div class="kpi emph"><div class="kpi-lb">Tu desempeño</div><div class="kpi-val" style="font-size:20px">${miNP.promedio.toFixed(1)}</div><div class="kpi-sb"><span class="pill ${miCl.cls}">${miCl.emoji} ${miCl.label}</span></div></div>`:`<div class="kpi"><div class="kpi-lb">Desempeño</div><div class="kpi-val" style="font-size:16px;color:var(--ink-faint)">—</div><div class="kpi-sb">Sin nota registrada aún</div></div>`}
    </div>

    ${miNP?`<div class="card"><div class="card-tt">Tus notas</div><div class="note-grid">
      <div class="note-card"><div class="note-lb">Parcial</div><div class="note-val" style="color:var(--signal)">${miNP.parcial.toFixed(1)}</div></div>
      <div class="note-card"><div class="note-lb">Actividades prom.</div><div class="note-val">${miNP.actividades.toFixed(1)}</div></div>
      <div class="note-card"><div class="note-lb">Nota final</div><div class="note-val" style="color:${miCl.cls==='p-good'?'var(--good)':miCl.cls==='p-warn'?'var(--warn)':'var(--bad)'}">${miNP.promedio.toFixed(1)}</div></div>
    </div></div>`:''}

    <div class="card"><div class="card-tt">Sesiones grabadas</div><div style="font-size:13px;color:var(--ink-dim);line-height:1.7;">
      Has enviado <strong style="color:var(--ink);font-family:var(--f-d);font-size:16px;">${sesEnv.length}</strong> audios de <strong style="color:var(--ink)">${SS.length}</strong> sesiones del curso.
      ${ord.length?`<br/>Última sesión grabada: <span style="color:var(--signal);font-family:var(--f-m)">${ns(ord[ord.length-1].Sesion)}</span>`:''}
    </div></div>

    <div class="grid2">
      <div class="card"><div class="card-tt">Tu riqueza léxica por sesión</div><div class="cw"><canvas id="ch-e-rl"></canvas></div></div>
      <div class="card"><div class="card-tt">Muletillas y dudas por sesión</div><div class="cw"><canvas id="ch-e-mts"></canvas></div></div>
    </div>

    <div class="card"><div class="card-tt">Tú vs. el grupo</div>
      <div class="cmp-legend"><span><span class="dot" style="background:#4f8ef7"></span>Tú</span><span><span class="dot" style="background:#3ecf8e"></span>Mejor del grupo</span><span><span class="dot" style="background:#ef5972"></span>Peor del grupo</span></div>
      ${vars.map(v=>{const vYo=yo[v.k]||0,vM=mejor[v.k]||0,vP=peor[v.k]||0,mx=Math.max(vYo,vM,vP,v.max)*1.1||1;
        return `<div class="cmp-block"><div class="cmp-name">${v.l}</div>
          <div class="cmp-line"><div class="cmp-tag">Tú</div><div class="cmp-track"><div class="cmp-fill" style="width:${Math.min(100,vYo/mx*100)}%;background:#4f8ef7"></div></div><div class="cmp-num">${v.f(vYo)}</div></div>
          <div class="cmp-line"><div class="cmp-tag">Mejor</div><div class="cmp-track"><div class="cmp-fill" style="width:${Math.min(100,vM/mx*100)}%;background:#3ecf8e"></div></div><div class="cmp-num">${v.f(vM)}</div></div>
          <div class="cmp-line"><div class="cmp-tag">Peor</div><div class="cmp-track"><div class="cmp-fill" style="width:${Math.min(100,vP/mx*100)}%;background:#ef5972"></div></div><div class="cmp-num">${v.f(vP)}</div></div>
        </div>`;}).join('')}
    </div>

    <div class="card"><div class="card-tt">Tus promedios generales</div><div class="ms-grid">
      <div class="ms"><div class="ms-lb">Riqueza léxica</div><div class="ms-val">${(yo.rl*100).toFixed(1)}%</div></div>
      <div class="ms"><div class="ms-lb">Muletillas</div><div class="ms-val">${yo.mts.toFixed(1)}</div></div>
      <div class="ms"><div class="ms-lb">Dudas</div><div class="ms-val">${yo.dds.toFixed(1)}</div></div>
      <div class="ms"><div class="ms-lb">Negaciones</div><div class="ms-val">${yo.neg.toFixed(1)}</div></div>
      <div class="ms"><div class="ms-lb">Sim. coseno</div><div class="ms-val">${isNaN(yo.sim)||yo.sim===0?'—':(yo.sim*100).toFixed(0)+'%'}</div></div>
      <div class="ms"><div class="ms-lb">Palabras prom.</div><div class="ms-val">${Math.round(yo.pal)}</div></div>
    </div></div>
  `;
  setTimeout(()=>{
    const lb=ord.map(r=>SS.find(s=>s.v===ns(r.Sesion))?.l||ns(r.Sesion));
    mkChart('ch-e-rl','line',lb,[{label:'Riqueza léxica (%)',data:ord.map(r=>(parseFloat(r.riqueza_lexica||0)*100).toFixed(2)),borderColor:'#4f8ef7',backgroundColor:'rgba(79,142,247,0.08)',tension:0.4,fill:true,pointBackgroundColor:'#4f8ef7',pointRadius:4}]);
    mkChart('ch-e-mts','bar',lb,[{label:'Muletillas',data:ord.map(r=>r.conteo_muletillas||0),backgroundColor:'rgba(245,166,35,0.7)',borderRadius:4},{label:'Dudas',data:ord.map(r=>r.conteo_dudas||0),backgroundColor:'rgba(239,89,114,0.7)',borderRadius:4}]);
  },80);
}
</script>
</body>
</html>
