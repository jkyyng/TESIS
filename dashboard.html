<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foné — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#060a12;--bg2:#0b1220;--bg3:#101a2e;--bg4:#162038;
      --border:rgba(99,179,237,0.1);--border2:rgba(99,179,237,0.22);
      --text:#e8f0fe;--muted:#5a7a9e;
      --accent:#3b82f6;--accent2:#60a5fa;
      --green:#34d399;--yellow:#fbbf24;--red:#f87171;--purple:#a78bfa;
      --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;}
    /* Header */
    .header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:rgba(6,10,18,0.95);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;}
    .logo{font-family:var(--font-d);font-weight:800;font-size:20px;}
    .logo span{color:var(--accent2);}
    .header-right{display:flex;align-items:center;gap:10px;}
    .user-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--accent2);font-family:var(--font-m);}
    .btn-sm{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--font-b);transition:all 0.15s;}
    .btn-sm:hover{color:var(--text);border-color:var(--border2);}
    /* Login */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,0.08) 0%,transparent 60%);}
    .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:40px;max-width:400px;width:100%;}
    .login-title{font-family:var(--font-d);font-size:26px;font-weight:800;margin-bottom:4px;}
    .login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
    .rol-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
    .rol-opt{padding:18px 12px;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;transition:all 0.2s;color:var(--text);}
    .rol-opt:hover{border-color:var(--accent);transform:translateY(-2px);}
    .rol-opt.selected{border-color:var(--accent);background:rgba(59,130,246,0.1);}
    .rol-opt .ri{font-size:28px;margin-bottom:6px;display:block;}
    .rol-opt .rl{font-size:13px;font-weight:700;font-family:var(--font-d);}
    .fl{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);font-weight:500;display:block;margin-bottom:6px;}
    .fi{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:14px;font-family:var(--font-b);color:var(--text);width:100%;transition:border-color 0.15s;margin-bottom:10px;}
    .fi:focus{outline:none;border-color:var(--accent);}
    .fm{font-size:12px;min-height:18px;margin-bottom:10px;}
    .fm.err{color:var(--red);}
    .fm.ok{color:var(--green);}
    .btn-p{width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:10px;font-family:var(--font-d);font-weight:700;font-size:15px;cursor:pointer;transition:all 0.2s;}
    .btn-p:hover{background:#2563eb;transform:translateY(-1px);}
    .btn-p:disabled{background:var(--bg3);color:var(--muted);cursor:not-allowed;transform:none;}
    /* Main */
    .main{padding:28px;max-width:1200px;margin:0 auto;}
    .page-title{font-family:var(--font-d);font-size:26px;font-weight:800;margin-bottom:4px;}
    .page-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
    /* Tabs */
    .tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:1px solid var(--border);}
    .tab{padding:10px 22px;background:none;border:none;color:var(--muted);font-family:var(--font-b);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
    .tab:hover{color:var(--text);}
    .tab.active{color:var(--accent2);border-bottom-color:var(--accent2);font-weight:600;}
    .tab-content{display:none;}
    .tab-content.active{display:block;}
    /* KPIs */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
    @media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
    .kpi{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;}
    .kpi.highlight{border-color:rgba(59,130,246,0.3);background:rgba(59,130,246,0.05);}
    .kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:8px;}
    .kpi-value{font-family:var(--font-d);font-size:30px;font-weight:800;}
    .kpi-sub{font-size:11px;color:var(--muted);margin-top:4px;}
    /* Cards */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px;}
    .card-title{font-family:var(--font-d);font-size:14px;font-weight:700;margin-bottom:16px;color:var(--text);display:flex;align-items:center;gap:8px;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
    @media(max-width:700px){.grid-2,.grid-3{grid-template-columns:1fr;}}
    /* Table */
    .tw{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap;}
    td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(59,130,246,0.03);}
    /* Badges */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
    .b-green{background:rgba(52,211,153,0.12);color:var(--green);border:1px solid rgba(52,211,153,0.2);}
    .b-yellow{background:rgba(251,191,36,0.12);color:var(--yellow);border:1px solid rgba(251,191,36,0.2);}
    .b-red{background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.2);}
    .b-blue{background:rgba(59,130,246,0.12);color:var(--accent2);border:1px solid rgba(59,130,246,0.2);}
    /* Sesiones */
    .sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}
    .sc{padding:10px 8px;border-radius:10px;text-align:center;border:1px solid var(--border);transition:all 0.2s;}
    .sc.ok{background:rgba(52,211,153,0.08);border-color:rgba(52,211,153,0.3);}
    .sc.no{background:rgba(248,113,113,0.05);border-color:rgba(248,113,113,0.15);}
    .sc .sn{font-family:var(--font-d);font-weight:700;font-size:15px;display:block;margin-bottom:2px;}
    .sc .sf{font-size:10px;color:var(--muted);}
    .sc .st{font-size:10px;margin-top:3px;display:block;}
    .sc.ok .st{color:var(--green);}
    .sc.no .st{color:var(--red);}
    /* Progress bar comparativa */
    .cmp-row{display:flex;flex-direction:column;gap:12px;}
    .cmp-item{display:grid;grid-template-columns:140px 1fr 50px;align-items:center;gap:10px;font-size:12px;}
    .cmp-label{color:var(--muted);text-align:right;}
    .cmp-bar{background:var(--bg3);border-radius:4px;height:8px;overflow:hidden;position:relative;}
    .cmp-fill{height:100%;border-radius:4px;transition:width 0.6s ease;}
    .cmp-fill.me{background:var(--accent2);}
    .cmp-fill.best{background:var(--green);}
    .cmp-fill.worst{background:var(--red);}
    .cmp-val{font-family:var(--font-m);font-size:11px;color:var(--text);}
    .cmp-legend{display:flex;gap:16px;margin-bottom:14px;font-size:11px;}
    .cmp-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
    /* Notas */
    .nota-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
    .nota-card{background:var(--bg3);border-radius:10px;padding:14px;text-align:center;}
    .nota-card-label{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:6px;}
    .nota-card-value{font-family:var(--font-d);font-size:22px;font-weight:800;}
    /* Spinner */
    .spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:50px auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-msg{text-align:center;color:var(--muted);font-size:13px;padding:8px;}
    /* Chart */
    .cw{position:relative;height:220px;}
    .cw-tall{position:relative;height:280px;}
    /* Metric mini */
    .mr{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    @media(max-width:600px){.mr{grid-template-columns:repeat(2,1fr);}}
    .ms{background:var(--bg3);border-radius:10px;padding:12px 14px;}
    .msl{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:4px;}
    .msv{font-family:var(--font-d);font-size:18px;font-weight:700;}
    .mss{font-size:10px;color:var(--muted);margin-top:2px;}
    /* Toast */
    .toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 20px;font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all 0.3s;pointer-events:none;}
    .toast.show{opacity:1;transform:translateY(0);}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="sc-login" class="login-wrap">
  <div class="login-card">
    <div class="login-title">Fo<span style="color:var(--accent2)">né</span></div>
    <div class="login-sub">Dashboard de análisis de voz académica</div>
    <div class="rol-grid">
      <div class="rol-opt" id="opt-p" onclick="elegirRol('p')"><span class="ri">👨‍🏫</span><div class="rl">Profesor</div></div>
      <div class="rol-opt" id="opt-e" onclick="elegirRol('e')"><span class="ri">🎓</span><div class="rl">Estudiante</div></div>
    </div>
    <div id="cc" style="display:none;">
      <label class="fl">Cédula</label>
      <input class="fi" type="number" id="ic" placeholder="0000000000" oninput="vC()" onkeydown="if(event.key==='Enter')entrar()"/>
      <div class="fm" id="mc"></div>
    </div>
    <label class="fl">Clave de acceso</label>
    <input class="fi" type="password" id="ik" placeholder="_ _ _ _ _" oninput="vK()" onkeydown="if(event.key==='Enter')entrar()" style="letter-spacing:3px;font-family:var(--font-m)"/>
    <div class="fm" id="mk"></div>
    <button class="btn-p" id="be" onclick="entrar()" disabled>Entrar →</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="sc-dash" style="display:none;">
  <div class="header">
    <div class="logo">Fo<span>né</span> <span style="font-size:11px;color:var(--muted);font-family:var(--font-b);font-weight:400;margin-left:4px;">Dashboard</span></div>
    <div class="header-right">
      <div class="user-badge" id="ub"></div>
      <button class="btn-sm" onclick="salir()">Salir</button>
    </div>
  </div>
  <div class="main" id="dm"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ──
const URL_AS = 'https://script.google.com/macros/s/AKfycbw12TxEJDssZ8JYEx7GH7nd0TD5IfELgqki5KmuCbRp7kDlPIdyVO8Aka0zGtQlbIAe0A/exec';
const KP = {
  'XAJI0': { grupo:'Santiago Aparicio — Matemáticas I', key:'santiago' },
  'OHGI1': { grupo:'Omar Palacios — Data Mining',       key:'omar'    },
};
const KE = {
  '1010964822':'Y6DPB','1014482009':'HSAHX','1016946301':'THV3A','1028885900':'3ZMF8',
  '1029220048':'MDD4V','1033097334':'30T9N','1034779730':'T3W5U','1107842573':'ZBIKC',
  '1012344638':'IDKWN','1054287150':'NHJ7X','1022354452':'VG0FN','1141715942':'9XUY4',
  '1034662097':'1IBLJ','1000329597':'H75LX','1147486525':'O6QJI','1025063386':'UJV6O',
  '1010965081':'H9SDB','1096068485':'DW2PC','1013258532':'N9T84','1033102141':'AZYTJ',
  '1011323304':'XEPQ8','1014867126':'5JSG6','1024509578':'5KXVF','1014868162':'1T2TA',
  '1054895361':'LA753','1109549575':'LC58D','1011324854':'RC11E','1031424164':'RTJ5P',
  '1141517449':'HT0HL','1023164975':'9XPSE','1021634975':'IMVIH','1034519179':'CWI64',
  '1030220057':'CIYHE','1018434360':'7UR23','1140916332':'GDPPQ','1032877729':'0Y9DO',
  '1150184438':'M5IGQ','1057570650':'PKI7P','1025531736':'5TB94','1013123384':'874FR',
  '1012378143':'HOCN9','1032877807':'J2QP8','1029141009':'9UZFK','1014990403':'8UT0C',
};
const SS=[
  {v:'09/06/2026',l:'S1'},{v:'10/06/2026',l:'S2'},{v:'11/06/2026',l:'S3'},{v:'12/06/2026',l:'S4'},
  {v:'16/06/2026',l:'S5'},{v:'17/06/2026',l:'S6'},{v:'18/06/2026',l:'S7'},{v:'19/06/2026',l:'S8'},
  {v:'22/06/2026',l:'S9'},{v:'23/06/2026',l:'S10'},{v:'24/06/2026',l:'S11'},{v:'25/06/2026',l:'S12'},
  {v:'26/06/2026',l:'S13'},{v:'30/06/2026',l:'S14'},{v:'01/07/2026',l:'S15'},{v:'02/07/2026',l:'S16'},
  {v:'03/07/2026',l:'S17'},{v:'06/07/2026',l:'S18'},{v:'07/07/2026',l:'S19'},{v:'08/07/2026',l:'S20'},
  {v:'09/07/2026',l:'S21'},{v:'10/07/2026',l:'S22'},
];
const CD={plugins:{legend:{labels:{color:'#5a7a9e',font:{family:'DM Sans',size:11}}}},scales:{x:{ticks:{color:'#5a7a9e',font:{size:10},maxRotation:0},grid:{color:'rgba(99,179,237,0.05)'}},y:{ticks:{color:'#5a7a9e',font:{size:10}},grid:{color:'rgba(99,179,237,0.05)'}}}};

let ROL='',CED='',DATA=null,NOTAS=null,GP='',GK='',CH={};

// ── Login ──
function elegirRol(r){
  ROL=r;
  document.getElementById('opt-p').classList.toggle('selected',r==='p');
  document.getElementById('opt-e').classList.toggle('selected',r==='e');
  document.getElementById('cc').style.display=r==='e'?'':'none';
  document.getElementById('ik').value='';document.getElementById('mk').textContent='';
  document.getElementById('be').disabled=true;
}
function vC(){
  const c=document.getElementById('ic').value.trim();
  const m=document.getElementById('mc');
  if(!c){m.textContent='';return;}
  m.textContent=KE[c]?'✓ Cédula encontrada':'Cédula no registrada';
  m.className='fm '+(KE[c]?'ok':'err');
  vK();
}
function vK(){
  const k=document.getElementById('ik').value.trim().toUpperCase();
  const m=document.getElementById('mk');
  const b=document.getElementById('be');
  if(!k){m.textContent='';b.disabled=true;return;}
  if(ROL==='p'){
    const ok=!!KP[k];
    m.textContent=ok?'✓ Acceso autorizado':'Clave incorrecta';
    m.className='fm '+(ok?'ok':'err');
    b.disabled=!ok;
  } else {
    const c=document.getElementById('ic').value.trim();
    const ok=KE[c]&&k===KE[c];
    m.textContent=ok?'✓ Acceso autorizado':'Clave incorrecta';
    m.className='fm '+(ok?'ok':'err');
    b.disabled=!ok;
  }
}
async function entrar(){
  const k=document.getElementById('ik').value.trim().toUpperCase();
  if(ROL==='p'){GP=KP[k].grupo;GK=KP[k].key;}
  else CED=document.getElementById('ic').value.trim();
  document.getElementById('sc-login').style.display='none';
  document.getElementById('sc-dash').style.display='';
  document.getElementById('ub').textContent=ROL==='p'?'👨‍🏫 '+GP.split('—')[0].trim():'🎓 '+CED;
  document.getElementById('dm').innerHTML='<div class="spinner"></div><div class="loading-msg">Cargando datos...</div>';
  await cargar();
}
function salir(){
  ROL='';CED='';DATA=null;NOTAS=null;GP='';GK='';
  Object.values(CH).forEach(c=>{try{c.destroy();}catch(e){}});CH={};
  document.getElementById('sc-dash').style.display='none';
  document.getElementById('sc-login').style.display='flex';
  document.getElementById('ik').value='';document.getElementById('ic').value='';
  document.getElementById('mk').textContent='';document.getElementById('mc').textContent='';
  document.getElementById('be').disabled=true;
  document.querySelectorAll('.rol-opt').forEach(o=>o.classList.remove('selected'));
  document.getElementById('cc').style.display='none';
}

// ── Cargar datos ──
async function cargar(){
  try{
    const res=await fetch(`${URL_AS}?action=getDashboard`);
    const d=await res.json();
    if(!d.ok)throw new Error(d.error||'Error');
    DATA=d.registros;
    NOTAS=d.notas||{};
    if(ROL==='p') renderProf(DATA.filter(r=>r.Grupo===GP), NOTAS[GK]||[]);
    else renderEst(DATA, NOTAS, CED);
  }catch(err){
    document.getElementById('dm').innerHTML=`<div style="text-align:center;padding:60px;color:var(--muted)"><div style="font-size:40px;margin-bottom:12px">⚠️</div><div style="font-size:15px;color:var(--text);margin-bottom:8px">Error al cargar datos</div><div style="font-size:13px">${err.message}</div><br/><button onclick="cargar()" style="background:var(--accent);color:white;border:none;border-radius:8px;padding:10px 20px;cursor:pointer">Reintentar</button></div>`;
  }
}

// ── Utils ──
function ns(s){return String(s||'').split(' ')[0].trim();}
function p(rows,key){const v=rows.map(r=>parseFloat(r[key])).filter(v=>!isNaN(v));return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;}
function gb(arr,key){return arr.reduce((acc,r)=>{const k=ns(r[key]||r['Sesion']||key);(acc[k]=acc[k]||[]).push(r);return acc;},{});}
function gbc(arr,key){return arr.reduce((acc,r)=>{(acc[r[key]]=acc[r[key]]||[]).push(r);return acc;},{});}
function notaEst(notas, cedula){
  if(!notas||!notas.length)return null;
  const row=notas.find(r=>String(r['Documento']||r['Cedula']||r['cedula']||'')===String(cedula));
  if(!row)return null;
  return row;
}
function calcPromedio(notaRow, grupoKey){
  if(!notaRow)return null;
  let parciales=[], actividades=[];
  if(grupoKey==='santiago'){
    // PARCIAL 1 = 50%, promedio quices = 50%
    const p1=parseFloat(notaRow['PARCIAL 1']||notaRow['Parcial 1']||0);
    const quices=['Quiz Desigualdades','Quiz Transfor','Quiz rectas','Quiz funciones'].map(k=>parseFloat(notaRow[k]||0)).filter(v=>v>0);
    const promQ=quices.length?quices.reduce((a,b)=>a+b,0)/quices.length:0;
    if(p1>0)return{parcial:p1,actividades:promQ,promedio:(p1*0.5+promQ*0.5),notaRow};
  } else {
    const p1=parseFloat(notaRow['EP C1']||0);
    const acts=['Quiz CRISP-DM','Frizo Correl','Quiz 2 Crisp DM','Tarea 1','Qscaler','Proy 1E'].map(k=>parseFloat(notaRow[k]||0)).filter(v=>v>0);
    const promA=acts.length?acts.reduce((a,b)=>a+b,0)/acts.length:0;
    if(p1>0)return{parcial:p1,actividades:promA,promedio:(p1*0.5+promA*0.5),notaRow};
  }
  return null;
}
function clasificar(prom){
  if(prom===null||isNaN(prom))return{cls:'b-blue',label:'Sin nota',emoji:'—'};
  // Notas sobre 50 → convertir a escala 5
  const n=prom>10?prom/10:prom;
  if(n>=4.0)return{cls:'b-green',label:'Alto',emoji:'🟢'};
  if(n>=3.0)return{cls:'b-yellow',label:'Medio',emoji:'🟡'};
  return{cls:'b-red',label:'Bajo',emoji:'🔴'};
}
function mkChart(id,type,labels,datasets,opts={}){
  const c=document.getElementById(id);
  if(!c)return;
  try{if(CH[id])CH[id].destroy();}catch(e){}
  CH[id]=new Chart(c,{type,data:{labels,datasets},options:{...CD,...opts,responsive:true,maintainAspectRatio:false}});
}

// ══════════════════════════════════════════════════════
// DASHBOARD PROFESOR
// ══════════════════════════════════════════════════════
function renderProf(reg, notas){
  const est=reg.filter(r=>r.Es_Profesor!=='SÍ');
  const sesVistas=[...new Set(est.map(r=>ns(r.Sesion)))].sort();
  const ceds=[...new Set(est.map(r=>String(r.Cedula)))];
  const cumpl=Math.round((est.length/(ceds.length*sesVistas.length))*100)||0;

  // Calcular promedios y clasificaciones
  const perfiles=ceds.map(ced=>{
    const rows=est.filter(r=>String(r.Cedula)===ced);
    const nr=notaEst(notas,ced);
    const np=calcPromedio(nr,GK);
    const cl=clasificar(np?.promedio||null);
    return{ced,rows,nr,np,cl,
      rl:p(rows,'riqueza_lexica'),mts:p(rows,'conteo_muletillas'),
      dds:p(rows,'conteo_dudas'),neg:p(rows,'conteo_negaciones'),
      sim:p(rows,'similitud_coseno'),pal:p(rows,'num_palabras'),
      enviadas:rows.length};
  }).sort((a,b)=>(b.np?.promedio||0)-(a.np?.promedio||0));

  const conNota=perfiles.filter(p=>p.np);
  const sinNota=perfiles.filter(p=>!p.np);
  const nAlto=conNota.filter(p=>p.cl.label==='Alto').length;
  const nMedio=conNota.filter(p=>p.cl.label==='Medio').length;
  const nBajo=conNota.filter(p=>p.cl.label==='Bajo').length;

  document.getElementById('dm').innerHTML=`
    <div class="page-title">${GP}</div>
    <div class="page-sub">Análisis de voz académica · Foné</div>

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Estudiantes</div><div class="kpi-value">${ceds.length}</div><div class="kpi-sub">${sesVistas.length} sesiones</div></div>
      <div class="kpi"><div class="kpi-label">Audios recibidos</div><div class="kpi-value">${est.length}</div><div class="kpi-sub">${Math.round(est.length/ceds.length*10)/10} prom/est</div></div>
      <div class="kpi"><div class="kpi-label">Cumplimiento</div><div class="kpi-value">${cumpl}%</div><div class="kpi-sub">audios / esperados</div></div>
      <div class="kpi highlight"><div class="kpi-label">Distribución</div><div class="kpi-value" style="font-size:18px">🟢${nAlto} 🟡${nMedio} 🔴${nBajo}</div><div class="kpi-sub">${sinNota.length} sin nota aún</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="st('resumen',this)">📊 Resumen</button>
      <button class="tab" onclick="st('estudiantes',this)">👥 Estudiantes</button>
      <button class="tab" onclick="st('sesiones',this)">📅 Sesiones</button>
      <button class="tab" onclick="st('variables',this)">🔬 Variables</button>
      <button class="tab" onclick="st('alertas',this)">⚠️ Alertas</button>
    </div>

    <div id="t-resumen" class="tab-content active">${tResumen(perfiles,sesVistas,est)}</div>
    <div id="t-estudiantes" class="tab-content">${tEstudiantes(perfiles,sesVistas)}</div>
    <div id="t-sesiones" class="tab-content">${tSesiones()}</div>
    <div id="t-variables" class="tab-content">${tVariables(est,perfiles)}</div>
    <div id="t-alertas" class="tab-content">${tAlertas(perfiles,sesVistas)}</div>
  `;
  setTimeout(()=>renderChartsProf(est,sesVistas,perfiles),100);
}

function tResumen(perfiles,sesVistas,est){
  return `
    <div class="grid-2">
      <div class="card"><div class="card-title">📈 Riqueza léxica por sesión</div><div class="cw"><canvas id="ch-rl"></canvas></div></div>
      <div class="card"><div class="card-title">💬 Muletillas y dudas promedio</div><div class="cw"><canvas id="ch-mts"></canvas></div></div>
    </div>
    <div class="grid-2">
      <div class="card"><div class="card-title">🎯 Distribución por desempeño</div><div class="cw"><canvas id="ch-donut"></canvas></div></div>
      <div class="card"><div class="card-title">📊 Nota vs Riqueza léxica</div><div class="cw"><canvas id="ch-scatter"></canvas></div></div>
    </div>`;
}

function tEstudiantes(perfiles,sesVistas){
  const rows=perfiles.map(pf=>{
    const pct=Math.round(pf.enviadas/sesVistas.length*100);
    const npStr=pf.np?`${pf.np.promedio.toFixed(1)}`:'—';
    return `<tr>
      <td style="font-family:var(--font-m);font-size:11px">${pf.ced}</td>
      <td>${pf.enviadas}/${sesVistas.length} <span style="color:var(--muted);font-size:11px">(${pct}%)</span></td>
      <td>${(pf.rl*100).toFixed(1)}%</td>
      <td>${pf.mts.toFixed(1)}</td>
      <td>${pf.dds.toFixed(1)}</td>
      <td>${isNaN(pf.sim)||pf.sim===0?'—':(pf.sim*100).toFixed(0)+'%'}</td>
      <td style="font-family:var(--font-m);font-weight:700">${npStr}</td>
      <td><span class="badge ${pf.cl.cls}">${pf.cl.emoji} ${pf.cl.label}</span></td>
    </tr>`;
  }).join('');
  return `<div class="card"><div class="card-title">Todos los estudiantes — ordenados por nota</div>
    <div class="tw"><table>
      <tr><th>Cédula</th><th>Sesiones</th><th>Riqueza léx.</th><th>Muletillas</th><th>Dudas</th><th>Sim. coseno</th><th>Nota prom.</th><th>Nivel</th></tr>
      ${rows}
    </table></div></div>`;
}

function tSesiones(){
  return `<div class="grid-2">
    <div class="card"><div class="card-title">👥 Participación por sesión</div><div class="cw"><canvas id="ch-part"></canvas></div></div>
    <div class="card"><div class="card-title">📈 Evolución riqueza léxica</div><div class="cw"><canvas id="ch-evol"></canvas></div></div>
  </div>
  <div class="card"><div class="card-title">🔄 Similitud coseno promedio por sesión</div><div class="cw"><canvas id="ch-sim"></canvas></div></div>`;
}

function tVariables(est,perfiles){
  const vars=[
    {k:'riqueza_lexica',l:'Riqueza léxica',f:v=>(v*100).toFixed(1)+'%'},
    {k:'conteo_muletillas',l:'Muletillas',f:v=>v.toFixed(1)},
    {k:'conteo_dudas',l:'Dudas',f:v=>v.toFixed(1)},
    {k:'conteo_negaciones',l:'Negaciones',f:v=>v.toFixed(1)},
    {k:'porcentaje_palabras_raras',l:'Palabras raras',f:v=>(v*100).toFixed(1)+'%'},
    {k:'similitud_coseno',l:'Sim. coseno',f:v=>isNaN(v)||v===0?'—':(v*100).toFixed(0)+'%'},
    {k:'num_palabras',l:'Palabras prom.',f:v=>Math.round(v)+''},
    {k:'duracion_segundos',l:'Duración prom.',f:v=>Math.round(v)+'s'},
  ];
  return `
    <div class="grid-2">
      <div class="card"><div class="card-title">🕸 Radar del grupo</div><div class="cw-tall"><canvas id="ch-radar"></canvas></div></div>
      <div class="grid-2" style="grid-template-columns:1fr 1fr;align-content:start;">
        ${vars.map(v=>`<div class="card" style="padding:14px;margin-bottom:0">
          <div class="card-title" style="font-size:11px;margin-bottom:6px">${v.l}</div>
          <div style="font-family:var(--font-d);font-size:20px;font-weight:800">${v.f(p(est,v.k))}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">promedio grupo</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function tAlertas(perfiles,sesVistas){
  const bajo=perfiles.filter(pf=>pf.cl.label==='Bajo');
  const pocas=perfiles.filter(pf=>pf.enviadas/sesVistas.length<0.6);
  const muletillas=perfiles.filter(pf=>pf.mts>5).sort((a,b)=>b.mts-a.mts);
  const dudas=perfiles.filter(pf=>pf.dds>3).sort((a,b)=>b.dds-a.dds);

  const mkAlerta=(title,items,cols,fn)=>items.length===0
    ?`<div class="card"><div class="card-title">${title}</div><div style="color:var(--green);font-size:13px">✅ Sin alertas en este indicador</div></div>`
    :`<div class="card"><div class="card-title">${title}</div><div class="tw"><table>
      <tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>
      ${items.map(fn).join('')}
    </table></div></div>`;

  return `
    ${mkAlerta('🔴 Estudiantes con bajo desempeño',bajo,['Cédula','Nota prom.','Riqueza léx.','Muletillas'],
      pf=>`<tr><td style="font-family:var(--font-m);font-size:11px">${pf.ced}</td><td>${pf.np?.promedio.toFixed(1)||'—'}</td><td>${(pf.rl*100).toFixed(1)}%</td><td>${pf.mts.toFixed(1)}</td></tr>`)}
    ${mkAlerta('📭 Estudiantes con bajo cumplimiento (&lt;60%)',pocas,['Cédula','Enviadas','%'],
      pf=>`<tr><td style="font-family:var(--font-m);font-size:11px">${pf.ced}</td><td>${pf.enviadas}/${sesVistas.length}</td><td>${Math.round(pf.enviadas/sesVistas.length*100)}%</td></tr>`)}
    <div class="grid-2">
      ${mkAlerta('💬 Muchas muletillas (&gt;5)',muletillas,['Cédula','Promedio'],
        pf=>`<tr><td style="font-family:var(--font-m);font-size:11px">${pf.ced}</td><td>${pf.mts.toFixed(1)}</td></tr>`)}
      ${mkAlerta('🤔 Muchas expresiones de duda (&gt;3)',dudas,['Cédula','Promedio'],
        pf=>`<tr><td style="font-family:var(--font-m);font-size:11px">${pf.ced}</td><td>${pf.dds.toFixed(1)}</td></tr>`)}
    </div>`;
}

function st(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('t-'+tab).classList.add('active');
  if(DATA) setTimeout(()=>{
    const d=DATA.filter(r=>r.Grupo===GP);
    const est=d.filter(r=>r.Es_Profesor!=='SÍ');
    const ses=[...new Set(est.map(r=>ns(r.Sesion)))].sort();
    const ceds=[...new Set(est.map(r=>String(r.Cedula)))];
    const pfs=ceds.map(ced=>{
      const rows=est.filter(r=>String(r.Cedula)===ced);
      const nr=notaEst(NOTAS[GK]||[],ced);
      const np=calcPromedio(nr,GK);
      return{ced,rows,np,cl:clasificar(np?.promedio||null),rl:p(rows,'riqueza_lexica'),mts:p(rows,'conteo_muletillas'),dds:p(rows,'conteo_dudas'),sim:p(rows,'similitud_coseno'),enviadas:rows.length};
    });
    renderChartsProf(est,ses,pfs);
  },100);
}

function renderChartsProf(est,sesVistas,perfiles){
  const bySes=gb(est,'Sesion');
  const lbl=sesVistas.map(s=>SS.find(x=>x.v===s)?.l||s);

  const dataRL=sesVistas.map(s=>{const r=bySes[s]||[];return r.length?(p(r,'riqueza_lexica')*100).toFixed(2):null;});
  const dataMts=sesVistas.map(s=>{const r=bySes[s]||[];return r.length?p(r,'conteo_muletillas').toFixed(2):null;});
  const dataDds=sesVistas.map(s=>{const r=bySes[s]||[];return r.length?p(r,'conteo_dudas').toFixed(2):null;});
  const dataPart=sesVistas.map(s=>(bySes[s]||[]).length);
  const dataSim=sesVistas.map(s=>{const r=bySes[s]||[];const v=p(r,'similitud_coseno');return r.length&&v?(v*100).toFixed(2):null;});

  mkChart('ch-rl','line',lbl,[{label:'Riqueza léxica (%)',data:dataRL,borderColor:'#60a5fa',backgroundColor:'rgba(96,165,250,0.08)',tension:0.4,fill:true,pointBackgroundColor:'#60a5fa',pointRadius:4}]);
  mkChart('ch-mts','bar',lbl,[
    {label:'Muletillas',data:dataMts,backgroundColor:'rgba(251,191,36,0.7)',borderRadius:4},
    {label:'Dudas',data:dataDds,backgroundColor:'rgba(248,113,113,0.7)',borderRadius:4}
  ]);
  mkChart('ch-part','bar',lbl,[{label:'Estudiantes',data:dataPart,backgroundColor:'rgba(59,130,246,0.7)',borderRadius:4}]);
  mkChart('ch-evol','line',lbl,[{label:'Riqueza léxica (%)',data:dataRL,borderColor:'#34d399',backgroundColor:'rgba(52,211,153,0.08)',tension:0.4,fill:true,pointBackgroundColor:'#34d399',pointRadius:4}]);
  mkChart('ch-sim','line',lbl,[{label:'Similitud coseno (%)',data:dataSim,borderColor:'#a78bfa',backgroundColor:'rgba(167,139,250,0.08)',tension:0.4,fill:true,pointBackgroundColor:'#a78bfa',pointRadius:4}]);

  // Donut clasificación
  const nA=perfiles.filter(pf=>pf.cl.label==='Alto').length;
  const nM=perfiles.filter(pf=>pf.cl.label==='Medio').length;
  const nB=perfiles.filter(pf=>pf.cl.label==='Bajo').length;
  const nS=perfiles.filter(pf=>pf.cl.label==='Sin nota').length;
  const cd=document.getElementById('ch-donut');
  if(cd){try{if(CH['ch-donut'])CH['ch-donut'].destroy();}catch(e){}
    CH['ch-donut']=new Chart(cd,{type:'doughnut',data:{labels:['Alto','Medio','Bajo','Sin nota'],datasets:[{data:[nA,nM,nB,nS],backgroundColor:['rgba(52,211,153,0.8)','rgba(251,191,36,0.8)','rgba(248,113,113,0.8)','rgba(91,122,158,0.5)'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#5a7a9e',font:{family:'DM Sans',size:11}}}}}});}

  // Scatter nota vs riqueza
  const sc=document.getElementById('ch-scatter');
  if(sc){
    const conNota=perfiles.filter(pf=>pf.np);
    try{if(CH['ch-scatter'])CH['ch-scatter'].destroy();}catch(e){}
    CH['ch-scatter']=new Chart(sc,{type:'scatter',data:{datasets:[{label:'Estudiantes',data:conNota.map(pf=>({x:(pf.rl*100).toFixed(1),y:pf.np.promedio.toFixed(1)})),backgroundColor:'rgba(96,165,250,0.7)',pointRadius:6}]},options:{...CD,responsive:true,maintainAspectRatio:false,scales:{x:{...CD.scales.x,title:{display:true,text:'Riqueza léxica (%)',color:'#5a7a9e',font:{size:11}}},y:{...CD.scales.y,title:{display:true,text:'Nota promedio',color:'#5a7a9e',font:{size:11}}}}}});
  }

  // Radar
  const cr=document.getElementById('ch-radar');
  if(cr){try{if(CH['ch-radar'])CH['ch-radar'].destroy();}catch(e){}
    CH['ch-radar']=new Chart(cr,{type:'radar',data:{labels:['Riqueza léxica','Sim. coseno','Sin muletillas','Con dudas','Negaciones','Sin p.raras'],datasets:[{label:'Grupo',data:[p(est,'riqueza_lexica')*100,p(est,'similitud_coseno')*100,Math.max(0,100-p(est,'frecuencia_muletillas')*1000),p(est,'frecuencia_dudas')*1000,p(est,'frecuencia_negaciones')*1000,Math.max(0,100-p(est,'porcentaje_palabras_raras')*100)],borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.12)',pointBackgroundColor:'#3b82f6',pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#5a7a9e'}}},scales:{r:{ticks:{color:'#5a7a9e',backdropColor:'transparent',font:{size:9}},grid:{color:'rgba(99,179,237,0.08)'},pointLabels:{color:'#8aaace',font:{size:10}}}}}});}
}

function renderEst(reg, allNotas, ced){
  // Determinar grupo del estudiante
  const misReg=reg.filter(r=>String(r.Cedula)===ced&&r.Es_Profesor!=='SÍ');
  if(misReg.length===0){
    document.getElementById('dm').innerHTML='<div style="text-align:center;padding:60px"><div style="font-size:40px;margin-bottom:12px">🎙️</div><div style="font-family:var(--font-d);font-size:16px;font-weight:700;margin-bottom:8px">Aún no tienes audios registrados</div><div style="font-size:13px;color:var(--muted)">Cuando envíes tu primer audio verás tus estadísticas aquí.</div></div>';
    return;
  }
  const grupoNombre=misReg[0].Grupo||'';
  const grupoKey=grupoNombre.includes('Santiago')?'santiago':'omar';
  const notas=allNotas[grupoKey]||[];

  // Mis sesiones
  const sesEnv=[...new Set(misReg.map(r=>ns(r.Sesion)))];
  const ord=[...misReg].sort((a,b)=>ns(a.Sesion).localeCompare(ns(b.Sesion)));

  // Mis notas
  const miNota=notaEst(notas,ced);
  const miNP=calcPromedio(miNota,grupoKey);
  const miCl=clasificar(miNP?.promedio||null);

  // Comparativa grupo — todos los estudiantes del mismo grupo
  const grupoReg=reg.filter(r=>r.Grupo===grupoNombre&&r.Es_Profesor!=='SÍ');
  const ceds=[...new Set(grupoReg.map(r=>String(r.Cedula)))];
  const grupoPerfiles=ceds.map(c=>{
    const rows=grupoReg.filter(r=>String(r.Cedula)===c);
    return{ced:c,rl:p(rows,'riqueza_lexica'),mts:p(rows,'conteo_muletillas'),dds:p(rows,'conteo_dudas'),neg:p(rows,'conteo_negaciones'),sim:p(rows,'similitud_coseno'),pal:p(rows,'num_palabras')};
  });

  const mejor=grupoPerfiles.reduce((a,b)=>b.rl>a.rl?b:a,grupoPerfiles[0]);
  const peor=grupoPerfiles.reduce((a,b)=>b.rl<a.rl?b:a,grupoPerfiles[0]);
  const yo={rl:p(misReg,'riqueza_lexica'),mts:p(misReg,'conteo_muletillas'),dds:p(misReg,'conteo_dudas'),neg:p(misReg,'conteo_negaciones'),sim:p(misReg,'similitud_coseno'),pal:p(misReg,'num_palabras')};

  const vars=[
    {k:'rl',l:'Riqueza léxica',f:v=>(v*100).toFixed(1)+'%',max:1},
    {k:'pal',l:'Palabras prom.',f:v=>Math.round(v)+'',max:300},
    {k:'sim',l:'Sim. coseno',f:v=>isNaN(v)||v===0?'—':(v*100).toFixed(0)+'%',max:1},
    {k:'mts',l:'Muletillas',f:v=>v.toFixed(1),max:20},
    {k:'dds',l:'Dudas',f:v=>v.toFixed(1),max:10},
    {k:'neg',l:'Negaciones',f:v=>v.toFixed(1),max:10},
  ];

  document.getElementById('dm').innerHTML=`
    <div class="page-title">Mis estadísticas</div>
    <div class="page-sub"><span style="font-family:var(--font-m);color:var(--accent2)">${ced}</span> · ${grupoNombre}</div>

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Sesiones enviadas</div><div class="kpi-value">${sesEnv.length}</div><div class="kpi-sub">de ${SS.length} totales</div></div>
      <div class="kpi"><div class="kpi-label">Cumplimiento</div><div class="kpi-value">${Math.round(sesEnv.length/SS.length*100)}%</div><div class="kpi-sub">${sesEnv.length>=SS.length*0.8?'✓ Excelente':sesEnv.length>=SS.length*0.5?'Mejorable':'Bajo'}</div></div>
      <div class="kpi"><div class="kpi-label">Riqueza léxica</div><div class="kpi-value">${(yo.rl*100).toFixed(1)}%</div><div class="kpi-sub">promedio personal</div></div>
      ${miNP?`<div class="kpi highlight"><div class="kpi-label">Tu desempeño</div><div class="kpi-value" style="font-size:22px">${miCl.emoji} ${miNP.promedio.toFixed(1)}</div><div class="kpi-sub"><span class="badge ${miCl.cls}">${miCl.label}</span></div></div>`
      :`<div class="kpi"><div class="kpi-label">Desempeño</div><div class="kpi-value" style="font-size:18px">—</div><div class="kpi-sub">Sin nota registrada aún</div></div>`}
    </div>

    ${miNP?`
    <div class="card">
      <div class="card-title">📝 Tus notas</div>
      <div class="nota-grid">
        <div class="nota-card"><div class="nota-card-label">Parcial</div><div class="nota-card-value" style="color:var(--accent2)">${miNP.parcial.toFixed(1)}</div></div>
        <div class="nota-card"><div class="nota-card-label">Actividades prom.</div><div class="nota-card-value">${miNP.actividades.toFixed(1)}</div></div>
        <div class="nota-card"><div class="nota-card-label">Nota final</div><div class="nota-card-value" style="color:${miCl.cls==='b-green'?'var(--green)':miCl.cls==='b-yellow'?'var(--yellow)':'var(--red)'}">${miNP.promedio.toFixed(1)}</div></div>
      </div>
    </div>`:''}

    <div class="card">
      <div class="card-title">📅 Historial de sesiones</div>
      <div class="sg">
        ${SS.map(s=>{const env=sesEnv.includes(s.v);return `<div class="sc ${env?'ok':'no'}"><span class="sn">${s.l}</span><span class="sf">${s.v}</span><span class="st">${env?'✓ Enviado':'Pendiente'}</span></div>`;}).join('')}
      </div>
    </div>

    <div class="grid-2">
      <div class="card"><div class="card-title">📈 Tu riqueza léxica por sesión</div><div class="cw"><canvas id="ch-e-rl"></canvas></div></div>
      <div class="card"><div class="card-title">💬 Muletillas y dudas por sesión</div><div class="cw"><canvas id="ch-e-mts"></canvas></div></div>
    </div>

    <div class="card">
      <div class="card-title">🔍 Tú vs el grupo — comparativa</div>
      <div class="cmp-legend">
        <span><span class="cmp-dot" style="background:#60a5fa"></span>Tú</span>
        <span><span class="cmp-dot" style="background:#34d399"></span>Mejor del grupo</span>
        <span><span class="cmp-dot" style="background:#f87171"></span>Peor del grupo</span>
      </div>
      <div class="cmp-row">
        ${vars.map(v=>{
          const vYo=yo[v.k]||0, vMejor=mejor[v.k]||0, vPeor=peor[v.k]||0;
          const mx=Math.max(vYo,vMejor,vPeor,v.max)*1.1||1;
          return `<div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:500">${v.l}</div>
            <div class="cmp-item"><div class="cmp-label">Tú</div><div class="cmp-bar"><div class="cmp-fill me" style="width:${Math.min(100,vYo/mx*100)}%"></div></div><div class="cmp-val">${v.f(vYo)}</div></div>
            <div class="cmp-item" style="margin-top:4px"><div class="cmp-label">Mejor grupo</div><div class="cmp-bar"><div class="cmp-fill best" style="width:${Math.min(100,vMejor/mx*100)}%"></div></div><div class="cmp-val">${v.f(vMejor)}</div></div>
            <div class="cmp-item" style="margin-top:4px"><div class="cmp-label">Peor grupo</div><div class="cmp-bar"><div class="cmp-fill worst" style="width:${Math.min(100,vPeor/mx*100)}%"></div></div><div class="cmp-val">${v.f(vPeor)}</div></div>
          </div>`;
        }).join('<div style="height:1px;background:var(--border);margin:8px 0"></div>')}
      </div>
    </div>

    <div class="card">
      <div class="card-title">📊 Tus promedios generales</div>
      <div class="mr">
        <div class="ms"><div class="msl">Riqueza léxica</div><div class="msv">${(yo.rl*100).toFixed(1)}%</div></div>
        <div class="ms"><div class="msl">Muletillas</div><div class="msv">${yo.mts.toFixed(1)}</div><div class="mss">por audio</div></div>
        <div class="ms"><div class="msl">Dudas</div><div class="msv">${yo.dds.toFixed(1)}</div><div class="mss">por audio</div></div>
        <div class="ms"><div class="msl">Negaciones</div><div class="msv">${yo.neg.toFixed(1)}</div><div class="mss">por audio</div></div>
        <div class="ms"><div class="msl">Sim. coseno</div><div class="msv">${isNaN(yo.sim)||yo.sim===0?'—':(yo.sim*100).toFixed(0)+'%'}</div></div>
        <div class="ms"><div class="msl">Palabras prom.</div><div class="msv">${Math.round(yo.pal)}</div></div>
      </div>
    </div>
  `;

  setTimeout(()=>{
    const lb=ord.map(r=>SS.find(s=>s.v===ns(r.Sesion))?.l||ns(r.Sesion));
    mkChart('ch-e-rl','line',lb,[{label:'Riqueza léxica (%)',data:ord.map(r=>(parseFloat(r.riqueza_lexica||0)*100).toFixed(2)),borderColor:'#60a5fa',backgroundColor:'rgba(96,165,250,0.08)',tension:0.4,fill:true,pointBackgroundColor:'#60a5fa',pointRadius:4}]);
    mkChart('ch-e-mts','bar',lb,[
      {label:'Muletillas',data:ord.map(r=>r.conteo_muletillas||0),backgroundColor:'rgba(251,191,36,0.7)',borderRadius:4},
      {label:'Dudas',data:ord.map(r=>r.conteo_dudas||0),backgroundColor:'rgba(248,113,113,0.7)',borderRadius:4}
    ]);
  },100);
}
</script>
</body>
</html>
